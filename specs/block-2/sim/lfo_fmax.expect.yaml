deck: lfo_fmax.cir
description: block-2 LFO HEADLINE — the integrator+Schmitt relaxation oscillator runs at f_max = 20 Hz at full rate drive (k=1), matching plugin speedHz=0.05*400^1. Real hysteretic .tran osc; period measured between zero-crossings. V_sat cancels (V_H scales with it).
plugin_ref: "plugin/src/dsp/LFO.hpp:16 — speedHz=0.05*400^param -> 20 Hz at param=1; analog f=(R5+R7)/(4*R7*R_INT*C_INT) per specs/aux/modulation/lfo-core/spec.md + spec block-2 §2 line 67"
netlist_bind:  # f_max is pinned by all four passives; any drift moves f outside 5%
  R_INT:   "R1=590k"
  R_FB_SQ: "R5=100k"
  R_HYS:   "R7=82k"
  C_INT:   "C1=47nF"
measurements:
  # DERIVED from the formula, NOT from deck output:
  #   f_max = (R5+R7)/(4*R7*R1*C1) = 182000/(4*82000*590000*47e-9) = 20.0 Hz.
  # tol_pct 5 absorbs the ideal-comparator edge timing + finite-step period quantization.
  - name: fhz
    expect: 20.0
    tol_pct: 5
