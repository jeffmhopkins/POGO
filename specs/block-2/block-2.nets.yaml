# POGO Block 2 — Dual LFO (triangle, 0.05–20 Hz) — schematic netlist
#
# Source of truth, transcribed from:
#   specs/components.yaml  (block-2 rows; BOM authoritative)
#   specs/block-2/spec.md  (FINALIZED 2026-05-29: drive-attenuator rate control)
#   specs/aux/aux-lfo-core.md (integrator + Schmitt trigger core)
#   plugin/src/dsp/LFO.hpp (f = 0.05*400^param; triangle ±5V; LFO1 normals to mod bus)
#
# Each LFO = one TL072: half A = integrator (triangle), half B = Schmitt comparator
# (square). Rate is set by attenuating the Schmitt square (V_sq) into the integrator:
# trimpot divider on V_sq, wiper -> fixed R_INT -> integrator. f ∝ wiper fraction.
# R_FLOOR bounds the slow end. LED indicator (change 0018): full-cycle "breathing" driver —
# V_tri level-shifted onto an NPN base (R_BTRI/R_BBIAS/R_BGND), LED ← +12V → collector,
# emitter → R_E → GND, so I_LED ∝ (V_tri+5) matching the plugin law (V_tri+5)/10.
# Both LFO outputs tap the block-3 MOD_SRC switch (no MOD_IN auto-normal).
#
# Refdes: grouped bypass refs expand by suffix — C3 (qty2) -> C3A/C3B (U1 +/- rails),
# C5 (qty2) -> C5A/C5B (U2).

block: block-2
board: utility
title: POGO Block 2 - Dual LFO

parts:
  U1:  { sym: opamp2, part: TL072CDT, value: TL072 }   # LFO1: A=integrator, B=Schmitt
  U2:  { sym: opamp2, part: TL072CDT, value: TL072 }   # LFO2
  C1:  { sym: c, value: 47nF }                          # C_INT1 (C0G)
  C2:  { sym: c, value: 47nF }                          # C_INT2 (C0G)
  C3A: { sym: c, value: 100nF }                         # U1 +12V bypass
  C3B: { sym: c, value: 100nF }                         # U1 -12V bypass
  C5A: { sym: c, value: 100nF }                         # U2 +12V bypass
  C5B: { sym: c, value: 100nF }                         # U2 -12V bypass
  R1:  { sym: r, value: 590k }                          # R_INT1 (sets f_max)
  R2:  { sym: r, value: 590k }                          # R_INT2
  R3:  { sym: r, value: 2k4 }                           # R_FLOOR1 (sets f_min)
  R4:  { sym: r, value: 2k4 }                           # R_FLOOR2
  R5:  { sym: r, value: 100k }                          # R_FB_SQ1 (Schmitt feedback)
  R6:  { sym: r, value: 100k }                          # R_FB_SQ2
  R7:  { sym: r, value: 82k }                           # R_HYS1 (Schmitt to GND)
  R8:  { sym: r, value: 82k }                           # R_HYS2
  R9:  { sym: r, value: 470R }                          # R_E1 (LED driver emitter)
  R10: { sym: r, value: 470R }                          # R_E2
  R11: { sym: r, value: 1k }                            # R_OUT1
  R12: { sym: r, value: 1k }                            # R_OUT2
  Q1:  { sym: npn, part: MMBT3904, value: MMBT3904 }    # LFO1 LED breathing current source
  Q2:  { sym: npn, part: MMBT3904, value: MMBT3904 }    # LFO2 LED breathing current source
  R19: { sym: r, value: 51k }                           # R_BTRI1 (V_tri -> base)
  R20: { sym: r, value: 68k }                           # R_BBIAS1 (+12V -> base bias)
  R21: { sym: r, value: 10k }                           # R_BGND1 (base -> GND)
  R22: { sym: r, value: 51k }                           # R_BTRI2
  R23: { sym: r, value: 68k }                           # R_BBIAS2
  R24: { sym: r, value: 10k }                           # R_BGND2
  LED1: { sym: led, part: "LED 3mm", value: LFO1 }
  LED2: { sym: led, part: "LED 3mm", value: LFO2 }
  RV1: { sym: trimpot, part: "log pot", value: LFO1_RATE }
  RV2: { sym: trimpot, part: "log pot", value: LFO2_RATE }
  J5:  { sym: jack, part: PJ301M-12, value: LFO1 }
  J6:  { sym: jack, part: PJ301M-12, value: LFO2 }

nets:
  "+12V":  [U1.8, U2.8, C3A.1, C5A.1, LED1.A, LED2.A, R20.1, R23.1]
  "-12V":  [U1.4, U2.4, C3B.1, C5B.1]
  GND:     [U1.3, U2.3, R3.2, R4.2, R7.2, R8.2, R9.2, R10.2, R21.2, R24.2,
            C3A.2, C3B.2, C5A.2, C5B.2, J5.2, J6.2]

  # ---- LFO1 (U1) ----
  V_SQ1:   [U1.7, R5.1, RV1.3]            # Schmitt out -> R_FB_SQ + rate-attenuator top
  HYS1:    [U1.5, R5.2, R7.1]             # Schmitt (+) hysteresis node
  FLOORN1: [RV1.1, R3.1]                  # pot bottom -> R_FLOOR (-> GND)
  WIPER1:  [RV1.2, R1.1]                  # attenuated drive -> R_INT
  SUM1:    [U1.2, R1.2, C1.2]             # integrator (-) summing node
  V_TRI1:  [U1.1, C1.1, U1.6, R11.1, R19.1] # triangle: out, C_INT fb, Schmitt(-), R_OUT, LED-driver base tap
  QB1:     [R19.2, R20.2, R21.1, Q1.1]    # LED1 driver base: V_tri/+12V/GND level-shift -> Q1 base
  LEDK1:   [LED1.K, Q1.3]                  # LED1 cathode -> Q1 collector (current sink)
  QE1:     [Q1.2, R9.1]                    # Q1 emitter -> R_E1 (-> GND)
  LFO1_OUT: [R11.2, J5.1]                 # -> LFO1 jack + block-3 MOD_SRC switch pos 0 (boundary)

  # ---- LFO2 (U2) — standalone ----
  V_SQ2:   [U2.7, R6.1, RV2.3]
  HYS2:    [U2.5, R6.2, R8.1]
  FLOORN2: [RV2.1, R4.1]
  WIPER2:  [RV2.2, R2.1]
  SUM2:    [U2.2, R2.2, C2.2]
  V_TRI2:  [U2.1, C2.1, U2.6, R12.1, R22.1]
  QB2:     [R22.2, R23.2, R24.1, Q2.1]    # LED2 driver base
  LEDK2:   [LED2.K, Q2.3]                  # LED2 cathode -> Q2 collector
  QE2:     [Q2.2, R10.1]                   # Q2 emitter -> R_E2 (-> GND)
  LFO2_OUT: [R12.2, J6.1]                 # -> LFO2 jack + block-3 MOD_SRC switch pos 1 (boundary)

# Output jacks do not normal here (MOD_IN's switch lug is in block-3); lugs unused.
no_connect:
  - J5.3
  - J6.3

boundary:
  - LFO1_OUT   # -> block-3 MOD_SRC switch position 0 (LFO 1); LFO1 jack stays live
  - LFO2_OUT   # -> block-3 MOD_SRC switch position 1 (LFO 2); LFO2 jack stays live
