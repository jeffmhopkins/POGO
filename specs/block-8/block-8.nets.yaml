# POGO Block 8 — LP Filter 2 (stereo 2-pole OTA-C SVF, lowpass, mono/no tilt)
#
# Source of truth, transcribed from:
#   specs/components.yaml (block-8 rows; BOM authoritative, refs exact)
#   specs/block-8/spec.md (§2-§4) ; aux-ota-c-svf / aux-q-control / aux-expo-converter
#   datasheet-corrected pinouts: kicad_common.py sym_lm13700 / sym_that340 / sym_opa1612
#
# Structure = LP1 (block-5) MINUS the stereo tilt: a SINGLE shared expo (U60) drives
# both channels' integrator Iabc (LP2 has no tilt). The Q VCA is the SHARED-Q sheet
# cell B (U9/U10) — block-8 reaches it via boundary nets LP2_V1_*, LP2_SUMINV_*,
# LP2_QIABC_*. block-8 owns its own IRES_AMP (U65) producing V_ires for cell B.
# Output LP2_OUT_{L,R} feeds block-B output buffers.
#
# Lessons applied from block-5: LM13700 integrator Darlington buffers (v1/v2 state-
# variable outputs) get emitter pulldowns to V- (R88-R91); diode-bias pins NC.

block: block-8
board: audio
title: POGO Block 8 - LP Filter 2 (OTA-C SVF, mono)

parts:
  U56: { sym: ota, part: LM13700M, value: LM13700 }   # LP2 integrators L
  U57: { sym: ota, part: LM13700M, value: LM13700 }   # LP2 integrators R
  U58: { sym: opamp2, part: OPA1612, value: OPA1612 } # L: A=SUM_AMP, B=LP buffer
  U59: { sym: opamp2, part: OPA1612, value: OPA1612 } # R: A=SUM_AMP, B=LP buffer
  U65: { sym: opamp2, part: TL072CDT, value: TL072 }  # A=IRES_AMP, B=spare
  U60: { sym: expo, part: THAT340S14-U, value: THAT340 }  # shared L+R expo (no tilt)

  # integrator caps (C33 qty4 -> suffix A/B/C/D)
  C33A: { sym: c, value: 47nF }   # C1 L
  C33B: { sym: c, value: 47nF }   # C2 L
  C33C: { sym: c, value: 47nF }   # C1 R
  C33D: { sym: c, value: 47nF }   # C2 R

  R32: { sym: r, value: 100k }    # R_in L
  R33: { sym: r, value: 100k }    # R_in R
  R72: { sym: r, value: 100k }    # R_FB L (v2 feedback)
  R73: { sym: r, value: 100k }    # R_FB R
  R74: { sym: r, value: 100k }    # R_f L (SUM_AMP feedback)
  R75: { sym: r, value: 100k }    # R_f R
  R76: { sym: r, value: 1k }      # R_LIN OTA1 L
  R77: { sym: r, value: 1k }      # R_LIN OTA2 L
  R78: { sym: r, value: 1k }      # R_LIN OTA1 R
  R79: { sym: r, value: 1k }      # R_LIN OTA2 R
  # R88-R91 (Darlington-buffer pulldowns) removed — change 0020 §C: state vars tap unbuffered pins 5/12.
  R80: { sym: r, value: 100k }    # R_Iabc L (V_ires -> U9 cellB Iabc, boundary); change 0020 §D/M5: 1M→100k (Iabc pin ~−10.8V)
  R81: { sym: r, value: 100k }    # R_Iabc R (V_ires -> U10 cellB Iabc, boundary); change 0020 §D/M5: 1M→100k
  R82: { sym: r, value: 100k }    # R_QBIAS
  R83: { sym: r, value: 100k }    # R_QINV
  R84: { sym: r, value: 100k }    # R_f_q
  R85: { sym: r, value: 1M }      # R_IREF_A
  R86: { sym: r, value: 49k9 }    # R_VOCT (change 0020 §A: 47k→49.9k centers 17.92mV/oct at mid-trim)
  R87: { sym: r, value: 1k }      # R_E
  R230: { sym: r, part: "Vishay TFPT", value: 1k }  # tempco shunt (change 0020 §A): LP2_EXPO_BASE→GND, +4110ppm/K V/oct temp-comp

  RV19: { sym: trimpot, part: "Bourns 3224W", value: LP2_FREF }
  RV20: { sym: trimpot, part: "Bourns 3224W", value: LP2_1VOCT }
  RV21: { sym: trimpot, part: "Bourns 3224W", value: LP2_QMAX }

  D11: { sym: diode, part: 1N4148W, value: 1N4148W }

  C69: { sym: c, value: 100nF }   # C_IREF
  C70: { sym: c, value: 10nF }    # C_IABC L
  C71: { sym: c, value: 10nF }    # C_IABC R
  C72: { sym: c, value: 100nF }   # U56 V+
  C73: { sym: c, value: 100nF }   # U56 V-
  C74: { sym: c, value: 100nF }   # U57 V+
  C75: { sym: c, value: 100nF }   # U57 V-
  C76: { sym: c, value: 100nF }   # U58 V+
  C77: { sym: c, value: 100nF }   # U58 V-
  C78: { sym: c, value: 100nF }   # U59 V+
  C79: { sym: c, value: 100nF }   # U59 V-
  C80: { sym: c, value: 100nF }   # U65 V+
  C81: { sym: c, value: 100nF }   # U65 V-
  C82: { sym: c, value: 100nF }   # U60 +12V rail bypass
  C83: { sym: c, value: 100nF }   # U60 -12V rail bypass

nets:
  "+12V":
    [U56.11, U57.11, U58.8, U59.8, U65.8,
     R85.1, RV21.3,
     C72.1, C74.1, C76.1, C78.1, C80.1, C82.1]
  "-12V":
    [U56.6, U57.6, U58.4, U59.4, U65.4,
     U60.4, U60.11, R87.2,
     C73.1, C75.1, C77.1, C79.1, C81.1, C83.1]
  GND:
    [U58.3, U59.3, U65.3, RV21.1,
     R76.2, R77.2, R78.2, R79.2,
     C33A.2, C33B.2, C33C.2, C33D.2,
     D11.A,
     C69.2, C70.2, C71.2,
     C72.2, C73.2, C74.2, C75.2, C76.2, C77.2, C78.2, C79.2,
     C80.2, C81.2, C82.2, C83.2,
     R230.2]

  # ---- L channel SVF ----
  HP_OUT_L:     [R32.1]                       # <- block-7 HP out L (boundary)
  LP2_SUMINV_L: [U58.2, R32.2, R72.2, R74.1]  # SUM_AMP virtual ground (+ Q-cell, block-5)
  LP2_HP_L:     [U58.1, R74.2, U56.3]         # SUM_AMP out -> OTA1 In+
  # §C (change 0020): tap v1/v2 from the UNBUFFERED OTA outputs (pins 5/12), not the Darlington
  # buffers (8/9) — the ~1.26V buffer offset corrupts the OTA2 input + the SUM_AMP feedback loop
  # (SPICE ota_svf_loop.cir). Buffers (7/8/9/10) unused; pulldowns R88-R91 removed. f_ref unchanged.
  LP2_V1_L:     [U56.5, C33A.1, U56.14]       # v1 = OTA1 unbuffered out (pin5) + cap -> OTA2 In+ (+ Q-cell B In+, boundary to block-5)
  LP2_V2_L:     [U56.12, C33B.1, U58.5, R72.1] # v2 = OTA2 unbuffered out (pin12) + cap -> LP output buffer In+ + R_FB feedback
  LP2_OUT_L:    [U58.7, U58.6]                # LP buffer out (unity) -> block-B (boundary)

  # ---- R channel SVF ----
  HP_OUT_R:     [R33.1]                        # <- block-7 HP out R (boundary)
  LP2_SUMINV_R: [U59.2, R33.2, R73.2, R75.1]
  LP2_HP_R:     [U59.1, R75.2, U57.3]
  LP2_V1_R:     [U57.5, C33C.1, U57.14]        # v1 = OTA1 unbuffered out (pin5) + cap -> OTA2 In+ (+ Q-cell B In+, boundary) (§C)
  LP2_V2_R:     [U57.12, C33D.1, U59.5, R73.1] # v2 = OTA2 unbuffered out (pin12) + cap -> LP output buffer In+ + R_FB feedback (§C)
  LP2_OUT_R:    [U59.7, U59.6]                # -> block-B (boundary)

  # ---- OTA linearizing R (In- pins) ----
  LP2_LIN_A_L:  [U56.4, R76.1]
  LP2_LIN_B_L:  [U56.13, R77.1]
  LP2_LIN_A_R:  [U57.4, R78.1]
  LP2_LIN_B_R:  [U57.13, R79.1]

  # ---- expo converter (single, shared L+R; no tilt) ----
  LP2_VCTRL:    [R86.1]                        # <- control: LP2 V/oct CV (boundary)
  LP2_VOCT_TR:  [R86.2, RV20.1, RV20.2]        # R_VOCT -> RV20 (rheostat)
  LP2_EXPO_BASE: [U60.2, RV20.3, R230.1]       # Q1 base: V/oct via R86+RV20, tempco shunt R230 to GND (change 0020 §A)
  LP2_IABC:     [U60.1, U56.1, U56.16, U57.1, U57.16, C70.1, C71.1]  # shared Iabc -> both OTAs
  LP2_EXPO_EMIT: [U60.3, U60.12, R87.1]        # Q1+Q2 emitters -> R_E -> -12V
  LP2_IREF:     [U60.14, U60.13, RV19.3, C69.1]  # Q2 collector+base (diode-conn ref) + bypass
  LP2_IREF_TR:  [R85.2, RV19.1, RV19.2]        # +12V -> R_IREF -> RV19 (rheostat)

  # ---- IRES_AMP / Q driver (U65 half A) ----
  LP2_VBIAS:    [RV21.2, R82.1]                # RV21 wiper = V_bias -> R_QBIAS
  LP2_RES:      [R83.1]                        # resonance CV in (boundary)
  LP2_IRES_SUM: [U65.2, R82.2, R83.2, R84.1]   # IRES_AMP virtual ground
  LP2_VIRES:    [U65.1, R84.2, D11.K, R80.1, R81.1]  # V_ires (>=0 by D11) -> R_Iabc L+R
  LP2_QIABC_L:  [R80.2]                         # -> block-5 U9 cellB Iabc (boundary)
  LP2_QIABC_R:  [R81.2]                         # -> block-5 U10 cellB Iabc (boundary)

no_connect:
  # LM13700 linearizing-diode bias pins unused.
  - U56.2
  - U56.15
  - U57.2
  - U57.15
  # §C (change 0020): integrator Darlington buffers unused (state vars tap unbuffered pins 5/12).
  - U56.7
  - U56.8
  - U56.9
  - U56.10
  - U57.7
  - U57.8
  - U57.9
  - U57.10
  # THAT340 PNP transistors Q3 (5,6,7) and Q4 (8,9,10) unused.
  - U60.5
  - U60.6
  - U60.7
  - U60.8
  - U60.9
  - U60.10
  # U65 half B spare (IRES_AMP uses half A only).
  - U65.5
  - U65.6
  - U65.7

boundary:
  - HP_OUT_L      # <- block-7 (HP out L = LP2 input)
  - HP_OUT_R      # <- block-7 (HP out R)
  - LP2_OUT_L     # -> block-B (output buffers)
  - LP2_OUT_R     # -> block-B
  - LP2_VCTRL     # <- control: LP2 V/oct frequency CV
  - LP2_RES       # <- control/mod: LP2 resonance CV
  - LP2_V1_L      # -> block-5 (Q-cell B In+, L)
  - LP2_V1_R      # -> block-5 (Q-cell B In+, R)
  - LP2_SUMINV_L  # <-> block-5 (Q-cell B In-/Out at SUM_AMP virtual ground, L)
  - LP2_SUMINV_R  # <-> block-5 (Q-cell B In-/Out, R)
  - LP2_QIABC_L   # -> block-5 (Q-cell B Iabc, L)
  - LP2_QIABC_R   # -> block-5 (Q-cell B Iabc, R)
