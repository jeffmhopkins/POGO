boundary:
  - V5LOGIC
  - LP1_OUT_L
  - LP1_OUT_R
  - MOD_BP1_DIST     # <- block-3 DRIVE CV (drive-control summer)
  - BP1_DISTOUT_L
  - BP1_DISTOUT_R
  - BP1_SEL_WF
  - BP1_SEL_SC
  - VREF_P4          # -> dist2/dist3 CLIP detectors (shared +4V threshold; divider lives here)
  - VREF_N4          # -> dist2/dist3 CLIP detectors (shared -4V threshold; divider lives here)

