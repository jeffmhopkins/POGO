# POGO Block 3 — Mod Bus (MB processor + 3 MOD lights + 19 CV destinations)
#
# GENERATED 2026-05-29 (19x repetition). Source: specs/components.yaml block-3,
# aux-mod-bus-core / aux-attenuverter. MB_AMP scale/offset summer -> ±10V zener clamp
# -> MB_INV -> V_MODBUS rail -> 3 lights + 19 destinations. Each destination: override
# jack (tip-switch normals to V_MODBUS via R_SRC_NORM) + 100Ω/BAT54S protection +
# TL074 -V_src inverter + bipolar attenuverter pot -> MOD_<DEST> (boundary; summed with
# the panel CV at board level per the 2026-05-29 decision). VCA_AMT dest taps V_MODBUS
# directly (its override jack J26 lives in block-4, normalled to MOD_BUS). MOD_SRC (SW7,
# DW5) is deferred/planned and intentionally omitted.

