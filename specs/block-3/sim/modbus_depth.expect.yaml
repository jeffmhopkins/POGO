deck: modbus_depth.cir
description: Mod-bus depth at an unpatched destination — §H fix (change 0020 C2)
plugin_ref: "plugin/src/dsp/ModBus.hpp — applyDestination: source*att at full scale (~100% expected)"
netlist_bind:
  R_CLAMP:    "R37_1=100R"      # LP1_FREQ destination clamp series (Rprot=100 in the deck)
  R_INV_LOAD: "R_INV_IN_1=47k"  # the §H hi-Z load term (10k->47k) — anchors the depth_fix headline
# NOTE: the FIXED depth's dominant load term (the 47k §H inverter input) is now netlist-bound,
# so a regression of the §H 10k->47k change trips R_INV_LOAD. The remaining ~25k pot leg and the
# buggy 3.3k load (old 10k||~5k) are DERIVED/documentary — the ~25k pot value is symbolic in nets
# (unbindable) and the old 100k R_SRC_NORM was DELETED in §H (no surviving ref). depth_bug stays a
# documentary before-state (its constituents predate §H and no longer exist in the netlist).
measurements:
  - name: depth_bug      # 100k R_SRC_NORM into the original 3.3k node: ~3% (the C2 bug)
    expect: 3.2
    tol_abs: 0.5
  - name: depth_fix      # §H low-Z normal: ~99% (near-full depth restored)
    expect: 99.4
    tol_abs: 1.0
