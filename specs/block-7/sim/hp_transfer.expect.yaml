deck: hp_transfer.cir
description: block-7 HP — two-integrator OTA-C loop realizes a 2-pole HIGHPASS (12 dB/oct, 0 dB passband, peak=Q at f0); structural proof it is HP not LP/BP
plugin_ref: "plugin/src/dsp/HPFilter.hpp:32-40 — Simper SVF, HP tap return -(x - k*v1 - v2); spec block-7 §2 H_HP(s)=s^2/(s^2+(w0/Q)s+w0^2), f_ref=632 Hz, k=1/Q"
netlist_bind:  # change 0024 — deck literals must equal the live netlist values
  C_int: "C29A=47nF"
measurements:
  # passband well above f0 -> unity gain. H_HP(s->inf) = 1 => 0 dB.
  - name: pass_db
    expect: 0.0
    tol_abs: 0.5
  # LF asymptote of a 2-pole HP: +40 dB/decade = +40*log10(2) = +12.04 dB/octave.
  # Derived from H_HP(s->0) ~ s^2 (two zeros at origin), NOT copied from deck output.
  - name: slope_db_oct
    expect: 12.041
    tol_abs: 1.5
  # f0 corner. f_ref=632 Hz (spec §2; HPFilter F_REF). Marked by arg(H_HP)=+90deg,
  # which is exactly f0 for any Q (H_HP(jw0)=jQ). tol 2% covers component tolerance.
  - name: fcorner_hz
    expect: 632.0
    tol_pct: 2
  # resonant peak at f0: |H_HP(jw0)| = Q = 2 -> 20*log10(2) = 6.0206 dB.
  - name: peak_db
    expect: 6.0206
    tol_abs: 0.5
