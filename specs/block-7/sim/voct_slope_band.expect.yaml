deck: voct_slope_band.cir
description: block-7 V/oct slope TRIM-AUTHORITY band — the RV_1VOCT (RV17) 20k Bourns 3224W trim span (14.10–19.65 mV/oct) brackets the V_T*ln2 room-temp calibration band (+/-5% around 17.92 mV/oct) and reaches the target at ~24.5% travel; NOT the temperature swing (that is tempco R229's job). [NV] trim-range check.
plugin_ref: "plugin/src/dsp/HPFilter.hpp:18 / LPFilter.hpp:20 — f0 = f_ref*2^cutoffV (1 V/oct); analog expo base needs V_T*ln2 = 25.852mV*0.69315 = 17.92 mV/oct @ 25C"
netlist_bind:  # deck literals must equal the live netlist; RV17 is symbolic (HP_1VOCT) -> UNBINDABLE, its 20k (Bourns 3224W, components.yaml/spec.md:185) stays a documented literal
  R_VOCT: "R110=49k9"
  R_TEMPCO: "R229=1k"
measurements:
  # All DERIVED from divider ratio R_T/(R_VOCT+RV+R_T)*1V (mV) + target V_T*ln2=17.92 mV/oct.
  # Span of the 20k pot (R_VOCT=49.9k fixed, R_T=1k shunt):
  - name: mv_lo           # CCW end (RV=20k): well below band -> 1000/70900 = 14.104
    expect: 14.104
    tol_abs: 0.05
  - name: mv_tgt          # target point (RV=4910): lands on V_T*ln2 -> 1000/55810 = 17.918 (~24.5% travel, NOT mid)
    expect: 17.918
    tol_abs: 0.05
  - name: mv_hi           # CW end (RV=0): above band -> 1000/50900 = 19.646
    expect: 19.646
    tol_abs: 0.05
  # Band edges = 17.92 +/-5% = 17.024 .. 18.816 (R_VOCT +/-1% + R_T tol + V_T pair spread +
  # 25C tempco residual, RSS ~+/-3% rounded to +/-5% margin). Trim must reach beyond BOTH edges:
  - name: brackets_lo     # mv_lo (14.10) <= band_lo (17.024) -> TRUE (ample margin with 20k)
    expect: true
  - name: brackets_hi     # mv_hi (19.65) >= band_hi (18.816) -> TRUE
    expect: true
  - name: target_reachable # the 17.92 target is hit within travel (at RV~=4910) -> TRUE
    expect: true
  # FALSIFIABILITY (documents the fail-mode; proves the check is non-vacuous): a too-small 2k
  # pot re-centered on target reaches only 17.60..18.24 -> INSIDE the band -> brackets BOTH false.
  - name: f2_brackets_lo  # 17.60 <= 17.024 -> FALSE (2k pot too small to reach below band)
    expect: false
  - name: f2_brackets_hi  # 18.24 >= 18.816 -> FALSE (2k pot too small to reach above band)
    expect: false
