# POGO Global Component Registry — specs/components.yaml
# Generated: 2026-05-27 | Topology: 48HP
#
# Rules:
#   - ref is unique within each board
#   - board + ref = globally unique identifier
#   - This file is source of truth for the future KiCad 48HP generator
#   - qty > 1 means N identical components share a ref slot; KiCad generator expands to individual refs
#   - tol field (where present) = required resistor tolerance; all others: 5% OK unless noted
#
# PRECISION RESISTORS — 1% or better required (functional, not cosmetic):
#   R3, R4, R5, R6     block-1   OPA1612 gain ratio (4.83×) — L/R matching; low i_n×R noise
#   R_VOCT              block-5,6,7,8   47 kΩ THAT340 V/oct network — 1% error = 12 cents; with R_E+RV_1VOCT trims to 18.0 mV/V
#   R_inv_in, R_inv_f  block-3 attenuverters (MB_INV_1–5)  10 kΩ — center null depth >60 dB
#   R_MB_INV           block-3   100 kΩ — MB_INV inverter gain accuracy
#   R_TILT_INV_IN/FB   block-5   100 kΩ — tilt inverter; mismatch shifts tilt center null
#   R_IREF_A           blocks 5,6,7,8  1 MΩ — fixed part of I_ref network (R_total midpoint = 1250 kΩ → 9.6 µA; all cal targets 9–11 µA); 5% OK
#
# boards: audio | control | utility | panel

