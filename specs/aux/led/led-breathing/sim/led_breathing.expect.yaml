deck: led_breathing.cir
description: "LIBRARY (generic) check — NPN level-shift LED breathing driver: 3-resistor base superposition (R_BTRI/R_BBIAS/R_BGND → V_base, NON-VACUOUS) + I_LED range/shape (cutoff→~3mA, monotone). [NV] on Vbe. No netlist_bind (no netlist behind a library cell)."
plugin_ref: "plugin/src/Pogo.cpp:508-509 — brightness=(lfoRaw+1)*0.5, lfoRaw=V_tri/5 => (V_tri+5)/10 over the whole cycle; aux/led/led-breathing §Transfer Function (V_base 0.585/1.31/2.04)"
# (A) base voltages DERIVED by superposition from the resistor values (NOT deck output):
#   SumG = 1/51k + 1/68k + 1/10k = 134.314 uS
#   V_tri=-5: (-5/51k + 12/68k)/SumG = 0.5840 V ; 0: (12/68k)/SumG = 1.3139 V ;
#   V_tri=+5: (5/51k + 12/68k)/SumG = 2.0438 V.  NON-VACUOUS: perturb any base R and V_base moves.
# (B) I_LED [NV] Vbe (~0.6-0.7V) + real β => LOOSE tols (shape/range, not absolute):
#   -5: V_base 0.584<Vbe => ~0mA cutoff ; +5: (2.044-0.6)/470 = 3.07mA ; monotone rising.
measurements:
  - name: vb_m5
    expect: 0.584
    tol_abs: 0.02     # dark-point: < Vbe(~0.6) => Q cut off => LED off
  - name: vb_0
    expect: 1.314
    tol_abs: 0.02     # zero-crossing: mid breath
  - name: vb_p5
    expect: 2.044
    tol_abs: 0.02     # positive peak: brightest
  - name: iled_m5
    expect: 0.0
    tol_abs: 0.3      # cutoff; loose toe — exact knee is the [NV] Vbe
  - name: iled_p5
    expect: 3.0
    tol_pct: 20       # [NV]: Vbe knee + finite β absorb the rest; SHAPE (~3 mA) is the claim
  - name: iled_mono
    expect: true      # monotone rising (cutoff -> mid -> peak) — the breathing law's shape
