deck: voct_slope_band.cir
description: "aux voct-expo-divider V/oct slope TRIM-AUTHORITY band (LIBRARY mirror) — a 1V/oct base divider with an adequate-range calibration trim (POGO Bourns 3224W 20k) brackets the V_T*ln2 room-temp band (+/-5% around 17.92 mV/oct) and reaches the target at ~25% travel; NOT the temperature swing (the tempco shunt's job). [NV] trim-range check. Generic values, NO netlist_bind (no netlist behind a library primitive)."
plugin_ref: "plugin/src/dsp/HPFilter.hpp:18 / LPFilter.hpp:20 — f0 = f_ref*2^cutoffV (1 V/oct); analog expo base needs V_T*ln2 = 25.852mV*0.69315 = 17.92 mV/oct @ 25C"
measurements:
  # All DERIVED from the divider ratio R_T/(R_VOCT+R_TRIM+R_T)*1V (mV) + target V_T*ln2=17.92.
  # Generic R_VOCT=49804; 20k pot, target lands at R_TRIM=5000 (25% travel).
  - name: mv_lo           # CCW (R_TRIM=20k): 1000/(49804+20000+1000)=1000/70804 = 14.123
    expect: 14.123
    tol_abs: 0.05
  - name: mv_tgt          # target (R_TRIM=5000): 1000/(49804+5000+1000)=1000/55804 = 17.920
    expect: 17.920
    tol_abs: 0.05
  - name: mv_hi           # CW (R_TRIM=0): 1000/(49804+0+1000)=1000/50804 = 19.684
    expect: 19.684
    tol_abs: 0.05
  # Band edges = 17.92 +/-5% = 17.024 .. 18.816 (R_VOCT +/-1% + R_T tol + V_T pair spread +
  # 25C tempco residual, RSS ~+/-3% rounded to +/-5% margin). Trim must reach beyond BOTH edges:
  - name: brackets_lo     # mv_lo (14.123) <= band_lo (17.024) -> TRUE (ample margin with 20k)
    expect: true
  - name: brackets_hi     # mv_hi (19.684) >= band_hi (18.816) -> TRUE
    expect: true
  - name: target_reachable # the 17.92 target is hit within travel (R_TRIM~=5000) -> TRUE
    expect: true
  # FALSIFIABILITY (proves the check is non-vacuous): a too-small 2k trim re-centered on target
  # reaches only 17.60..18.24 -> INSIDE the band -> brackets BOTH false.
  - name: f2_brackets_lo  # 17.60 <= 17.024 -> FALSE (2k trim too small to reach below band)
    expect: false
  - name: f2_brackets_hi  # 18.24 >= 18.816 -> FALSE (2k trim too small to reach above band)
    expect: false
