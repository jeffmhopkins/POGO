deck: gm_c_corner.cir
description: LIBRARY (generic) check — gm-C integrator corner f = gm/(2*pi*C); no netlist_bind by design (no netlist behind a library block)
plugin_ref: "plugin/src/dsp/LPFilter.hpp:20-22 — f0 maps to SVF g=tan(pi*f0/fs); analog prototype ω0 = gm/C (aux/filter/ota-c-svf §Transfer Function: f0 = gm/(2π·C))"
