deck: wf_fold.cir
description: "LIBRARY (generic) check — the SIGNATURE wavefold: V_out = 2·V_clamp − V_in via a non-inverting G=+2 stage whose +2 gain EMERGES from R_g/R_f (=10k:10k), not a hardcoded ×2. Below the ±1.4 V clamp Vth V_clamp=V_in so V_out=V_in (slope +1); above Vth V_clamp pins ±1.4 so V_out=2.8−V_in (slope −1) — TRUE slope reversal. No netlist_bind by design (library block); the ±1.4 V Vth is a device constant [NV], but the fold reflection point is pinned by the R_g/R_f ratio (=1), so the check FAILS if that ratio is wrong."
plugin_ref: "plugin/src/dsp/Distortion.hpp:18-25 wavefold — V_out=2·V_clamp−V_in, Vth=0.28 (=±1.4V/5V); aux/distortion/wavefolder/spec.md §WF (R_g=R_f → G=+2)"
measurements:
  # DERIVED from the plugin/spec law V_out = 2·V_clamp − V_in (NOT copied from deck output):
  #  - wf_lin at V_in=+0.7 (below Vth): V_clamp=0.7 -> V_out = 2·0.7 − 0.7 = +0.7 (linear pass-through).
  - name: wf_lin
    expect: 0.7
    tol_abs: 0.03        # near-exact: ideal op-amp + below-clamp linear region
  #  - wf_fold at V_in=+2.8 (above Vth): V_clamp pins +1.4 -> V_out = 2·1.4 − 2.8 = 0.0 (the reflection).
  - name: wf_fold
    expect: 0.0
    tol_abs: 0.05        # near-zero: tol absorbs ideal-clamp/op-amp residue
  #  - wf_slope_rev: above Vth, V_out=2.8−V_in DECREASES as V_in rises (2.0->2.8): out(2.0)=0.8 > out(2.8)=0.0
  #    => slope reversed => boolean true. (A non-folding gain stage would have out INCREASE → false.)
  - name: wf_slope_rev
    expect: true
    tol_abs: 0.5         # boolean 1.0/0.0
