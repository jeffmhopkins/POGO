deck: mux_select.cir
description: "LIBRARY (generic, NO netlist_bind by design): verifies the CD4053 mux PATH-STEERING topology — exactly ONE of the three simultaneously-running paths (SC/HC/WF) reaches DIST_OUT per the mode select, and the de-selected paths do not. The selected path passes at ~unity with Ron modeled as negligible into a high-Z next stage (the precise Ron≈200Ω drop is a block-level concern, NOT pinned by this generic topology check). Per-band mode select (BP{n}_DIST_MODE: SOFT/HARD/FOLD). Representative per-path values 2.0 / 4.0 / -3.0."
plugin_ref: "aux/distortion/overview/spec.md §Parallel Paths, MUX Output Selection + §CD4053 Configuration (one CD4053 per BP group, selects SC/HC/WF via BP{n}_DIST_MODE); plugin Distortion.hpp processNorm() dispatches on `mode` — analog mux mirrors the mode switch"
# Generic library check — verifies the mux pass-through topology, not a netlist value.
measurements:
  - name: out_sel_sc
    expect: 2.0           # SOFT selected -> SC value passes unity (Ron drop negligible)
    tol_abs: 0.01
  - name: out_sel_hc
    expect: 4.0           # HARD selected -> HC value passes unity
    tol_abs: 0.01
  - name: out_sel_wf
    expect: -3.0          # FOLD selected -> WF value passes unity
    tol_abs: 0.01
