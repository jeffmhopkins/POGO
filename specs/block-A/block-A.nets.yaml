# POGO Block A — Input Buffers (L+R) — schematic netlist
#
# Source of truth for connectivity, transcribed from:
#   specs/block-A/spec.md        (signal routing, protection network, R normalling)
#   specs/aux/aux-unity-buffer.md (Variant A non-inverting follower, OPA1612)
#   specs/aux/aux-cv-protection.md (100Ω + BAT54S clamp; CRITICAL pin orientation)
#
# Consumed by tools/generate_schematic.py -> kicad/pogo-block-A.kicad_sch
# Connectivity is name-based: each net lists REF.PIN connection points; the
# generator drops a global label at every listed pin. Validate with --check.

block: block-A
board: audio
title: POGO Block A - Input Buffers (L+R)

# Reference designators in this block. `sym` selects the lib symbol + pin map;
# `part` (optional) binds to the components/ registry by its matches[] string
# for footprint/MPN resolution (passives have no registry part yet).
parts:
  J1: { sym: jack,    part: PJ301M-12, value: L_IN }
  J2: { sym: jack,    part: PJ301M-12, value: R_IN }
  R1: { sym: r,       value: 100R }
  R2: { sym: r,       value: 100R }
  D1: { sym: bat54s,  part: BAT54S,    value: BAT54S }
  D2: { sym: bat54s,  part: BAT54S,    value: BAT54S }
  U1: { sym: opamp2,  part: OPA1612,   value: OPA1612 }
  C1: { sym: c,       value: 100nF }
  C2: { sym: c,       value: 100nF }

# net -> connection points (REF.PIN). Pins not listed here must appear in
# no_connect, or --check fails (every part pin must be accounted for).
nets:
  "+12V":   [U1.8, D1.2, D2.2, C1.1]   # rail: opamp V+, both clamp cathodes, +decoup
  "-12V":   [U1.4, D1.1, D2.1, C2.1]   # rail: opamp V-, both clamp anodes,  -decoup
  GND:      [J1.2, J2.2, C1.2, C2.2]   # jack sleeves + decoupling returns

  L_IN_TIP: [J1.1, R1.1]               # L jack tip -> 100Ω series
  L_IN_BUF: [R1.2, D1.3, U1.3]         # post-R clamp node -> U1A In+
  L_OUT:    [U1.1, U1.2, J2.3]         # U1A out=In- (G=+1) ; -> R normalling lug on J2

  R_IN_TIP: [J2.1, R2.1]               # R jack tip -> 100Ω series
  R_IN_BUF: [R2.2, D2.3, U1.5]         # post-R clamp node -> U1B In+
  R_OUT:    [U1.7, U1.6]               # U1B out=In- (G=+1)

# Pins intentionally left floating (no-connect); excluded from coverage check.
no_connect:
  - J1.3   # L is the primary input; its switch lug is unused (no normalling source)

# Nets that leave this sheet to other blocks (documentation; they remain global
# labels so the next block's generator can join them by name).
boundary:
  - L_OUT   # -> Block 1 input L
  - R_OUT   # -> Block 1 input R
