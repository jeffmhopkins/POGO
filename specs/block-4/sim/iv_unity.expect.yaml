deck: iv_unity.cir
description: "[NV-free] VCA transimpedance I/V is unity (−1) at 0 dB — pure resistor ratio −(R_f/R_in)=−(20k/20k); THAT2180 0-dB current gain is unity by definition so the 6.1 mV/dB constant cancels. Also pins the current-input/virtual-ground (Z_in≈R_in=20k)."
plugin_ref: "plugin/src/dsp/VcaBlock.hpp:28 — return v*G (G=1 at control=1, 0 dB); spec/block-4 §2 Audio path: AUDIO_OUT=−I_out·R_f, R_f=R_in → −1; aux/vca/vca-cell/spec.md §Transfer Function"
netlist_bind:  # deck literals must equal the live block-4.nets.yaml values
  R_in: "R7=20k"
  R_f: "R40=20k"
measurements:
  - name: gain         # DERIVED FROM SPEC: −(R_f/R_in) = −(20k/20k) = −1.0
    expect: -1.0
    tol_abs: 0.02      # near-exact ratio; ideal op-amp + 1% resistors
  - name: vin_node_v   # DERIVED: current input -> virtual ground ≈ 0 V (so Z_in ≈ R_in = 20k)
    expect: 0.0
    tol_abs: 0.05
