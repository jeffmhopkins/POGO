deck: ref_divider.cir
description: "Shared Ec+ unity-trim +-ref rails REF_P/REF_N set by R233/R234 (45k3) from +-12V across the four parallel 10k trim pots (HIGH-3, change 0020). DIVERGENCE: spec.md:166 calls these +-1.2V, but the netlist divider math yields only +-0.32V (see comment) — expect is DERIVED FROM THE NETLIST values, not the stale spec number."
plugin_ref: "specs/block-4/spec.md:166 — 'shared +-1.2V reference (R233/R234)'  (analog-only; no plugin DSP)"
# NETLIST BINDING: the deck's R233/R234 = 45k3 literals MUST equal the netlist. If R233 were
# perturbed to 4k53 (10x smaller top leg) the bind FAILS and REF_P blows to ~+9.9V.
netlist_bind:
  R_ref_top: "R233=45k3"
  R_ref_bot: "R234=45k3"
measurements:
  # DERIVED from the NETLIST divider, NOT the spec's '+-1.2V' line (which is STALE / inconsistent
  # with the 45k3 + four-parallel-10k-pot values now in block-4.nets.yaml):
  #   node eqn at REF_P (symmetry REF_P=-REF_N=x):  (12 - x)/45300 = 2x/2500
  #   => 2500*(12-x) = 2*45300*x  => 30000 = 93100*x  => x = 0.3222 V.
  # So the netlist's divider sets REF_P ~ +0.32V / REF_N ~ -0.32V, NOT the spec's +-1.2V.
  # This is a real spec<->netlist divergence surfaced by the gate (reported, not papered over).
  # tol_abs 0.15 absorbs the ideal-pot-loading model (wiper taps, pot tolerance); the 0.9V gap
  # to the spec's 1.2V is FAR outside this band, so the assertion encodes the netlist truth.
  - name: ref_p
    expect: 0.322
    tol_abs: 0.15
  - name: ref_n
    expect: -0.322     # symmetry: REF_N = -REF_P
    tol_abs: 0.15
