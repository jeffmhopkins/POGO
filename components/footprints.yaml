# POGO panel footprint bindings — canonical source for panel_kicad._FOOTPRINT_MAP.
#
# Maps each SEMANTIC panel component type to its KiCad footprint + the panel-anchor
# offset (ox, oy) = footprint origin relative to the panel hole/anchor centre.
#   rel path consumed by tools = "<lib>.pretty/<name>.kicad_mod"  (under components/footprints/)
#
# ORDER IS SIGNIFICANT: tools/panel_kicad.py builds _FOOTPRINT_MAP from this list and
# panel_editor.py serialises it into the git-tracked docs/panel-editor.html editor payload, so a
# reordering would churn those files. Keep this order identical to the historical map.
footprints:
  - { type: jack_input,  lib: Connector_Audio,   name: Jack_3.5mm_QingPu_WQP-PJ398SM_Vertical_CircularHoles, ox: 0.0, oy: 6.48 }
  - { type: jack_output, lib: Connector_Audio,   name: Jack_3.5mm_QingPu_WQP-PJ398SM_Vertical_CircularHoles, ox: 0.0, oy: 6.48 }
  - { type: trimpot,     lib: Potentiometer_THT, name: Potentiometer_Songhuei_9mm_TallTrimmer_Vertical,        ox: 0.0, oy: 0.0 }
  - { type: knob,        lib: Potentiometer_THT, name: Potentiometer_Alpha_RD901F-40-00D_Single_Vertical_CircularHoles, ox: 7.5, oy: 2.5 }
  - { type: slider_V45,  lib: Potentiometer_THT, name: Potentiometer_Slider_45mm_Vertical,                    ox: 0.0, oy: 0.0 }
  - { type: led,         lib: LED_THT,           name: LED_D3.0mm,                                            ox: 0.0, oy: 0.0 }
  - { type: led_labeled, lib: LED_THT,           name: LED_D3.0mm,                                            ox: 0.0, oy: 0.0 }
  - { type: toggle_dw3,  lib: Button_Switch_THT, name: SW_Dailywell_DW3_DPDT,                                 ox: 0.0, oy: 0.0 }
  - { type: toggle_dw5,  lib: Button_Switch_THT, name: SW_Dailywell_DW5_DPDT,                                 ox: 0.0, oy: 0.0 }
