name: Build VCV Rack Plugin

# Triggers: every push to the dev branch or main, every PR, and manual dispatch
on:
  push:
    branches:
      - main
      - dev
      - "claude/**"
  pull_request:
  workflow_dispatch:

env:
  rack-plugin-toolchain-dir: /home/build/rack-plugin-toolchain

defaults:
  run:
    shell: bash

jobs:
  # ─── Linux x64 (fastest; used for development feedback) ───────────────────
  build-linux:
    name: Build · Linux x64
    runs-on: ubuntu-latest
    # Community-maintained toolchain image — SDK + cross-compilers pre-installed.
    # Canonical reference: github.com/qno/vcv-plugin-github-actions-example
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        run: |
          export PLUGIN_DIR=$GITHUB_WORKSPACE
          pushd ${{ env.rack-plugin-toolchain-dir }}
          make plugin-build-lin-x64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-linux-x64-${{ github.run_number }}
          path: ${{ env.rack-plugin-toolchain-dir }}/plugin-build
          if-no-files-found: warn
          retention-days: 30

  # ─── Windows x64 (cross-compiled from Linux via MinGW) ───────────────────
  build-win:
    name: Build · Windows x64
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        run: |
          export PLUGIN_DIR=$GITHUB_WORKSPACE
          pushd ${{ env.rack-plugin-toolchain-dir }}
          make plugin-build-win-x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-win-x64-${{ github.run_number }}
          path: ${{ env.rack-plugin-toolchain-dir }}/plugin-build
          if-no-files-found: warn
          retention-days: 30

  # ─── macOS (native runner; Apple SDK can't be cross-compiled) ─────────────
  build-mac:
    name: Build · macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Rack SDK version
        id: rack-sdk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/VCVRack/Rack/releases?per_page=1" | \
            jq -r '.[0].tag_name // empty' | \
            sed 's/^v//')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "ERROR: failed to resolve Rack SDK version from GitHub API" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Rack SDK version: $VERSION"

      - name: Download Rack SDK
        run: |
          curl -sLo RackSDK.zip "https://vcvrack.com/downloads/RackSDK-${{ steps.rack-sdk.outputs.version }}-mac-x64+arm64.zip"
          unzip -q RackSDK.zip

      - name: Build plugin
        run: |
          export RACK_DIR=$GITHUB_WORKSPACE/Rack-SDK
          make dist

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-mac-${{ github.run_number }}
          path: dist/
          if-no-files-found: warn
          retention-days: 30

  # ─── KiCad schematic generation + validation ──────────────────────────────
  kicad-build:
    name: KiCad · Generate & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kiutils
        run: pip install kiutils

      - name: Generate control board schematic
        run: python3 kicad/generate_control_board.py

      - name: Validate schematic (9 checks, 326 pin assignments)
        run: python3 kicad/validate_schematic.py kicad/pogo-control-board.kicad_sch

      - name: Upload schematic artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-kicad-${{ github.run_number }}
          path: kicad/pogo-control-board.kicad_sch
          if-no-files-found: error
          retention-days: 30
