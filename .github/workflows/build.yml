name: Build VCV Rack Plugin

# Triggers: every push to the dev branch or main, every PR, and manual dispatch
on:
  push:
    branches:
      - main
      - dev
      - "claude/**"
      - "topology_change"
  pull_request:
  workflow_dispatch:

env:
  rack-plugin-toolchain-dir: /home/build/rack-plugin-toolchain
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  # ─── Linux x64 (fastest; used for development feedback) ───────────────────
  build-linux:
    name: Build · Linux x64
    runs-on: ubuntu-latest
    # Community-maintained toolchain image — SDK + cross-compilers pre-installed.
    # Canonical reference: github.com/qno/vcv-plugin-github-actions-example
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build plugin
        run: |
          export PLUGIN_DIR=$GITHUB_WORKSPACE
          pushd ${{ env.rack-plugin-toolchain-dir }}
          make plugin-build-lin-x64

      - name: Stage artifact
        run: |
          mkdir -p /tmp/artifact
          find ${{ env.rack-plugin-toolchain-dir }}/plugin-build -name "*.vcvplugin" | \
            while read f; do zstd -d "$f" -c | tar -x -C /tmp/artifact/; done

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: POGO-linux-x64-${{ github.run_number }}
          path: /tmp/artifact
          if-no-files-found: warn
          retention-days: 30

  # ─── Windows x64 (cross-compiled from Linux via MinGW) ───────────────────
  build-win:
    name: Build · Windows x64
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build plugin
        run: |
          export PLUGIN_DIR=$GITHUB_WORKSPACE
          pushd ${{ env.rack-plugin-toolchain-dir }}
          make plugin-build-win-x64

      - name: Stage artifact
        run: |
          mkdir -p /tmp/artifact
          find ${{ env.rack-plugin-toolchain-dir }}/plugin-build -name "*.vcvplugin" | \
            while read f; do zstd -d "$f" -c | tar -x -C /tmp/artifact/; done

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: POGO-win-x64-${{ github.run_number }}
          path: /tmp/artifact
          if-no-files-found: warn
          retention-days: 30

  # ─── macOS (native runner; Apple SDK can't be cross-compiled) ─────────────
  build-mac:
    name: Build · macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Rack SDK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pushd $HOME
          VERSIONS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/VCVRack/Rack/tags?per_page=20" | \
            jq -r '.[].name | ltrimstr("v")' | grep '^2\.')
          for VERSION in $VERSIONS; do
            URL="https://vcvrack.com/downloads/Rack-SDK-${VERSION}-mac-x64+arm64.zip"
            echo "Trying Rack SDK v${VERSION}..."
            if wget -q -O Rack-SDK.zip "$URL"; then
              echo "Using Rack SDK v${VERSION}"
              unzip Rack-SDK.zip
              break
            fi
            rm -f Rack-SDK.zip
          done
          [ -d Rack-SDK ] || { echo "ERROR: No Rack SDK found for any recent version" >&2; exit 1; }

      - name: Build plugin
        run: |
          export RACK_DIR=$HOME/Rack-SDK
          make dep
          make dist

      - name: Stage artifact
        run: |
          mkdir -p artifact
          find dist -name "*.vcvplugin" | \
            while read f; do zstd -d "$f" -c | tar -x -C artifact/; done

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: POGO-mac-${{ github.run_number }}
          path: artifact
          if-no-files-found: warn
          retention-days: 30

  # ─── KiCad schematic generation + validation ──────────────────────────────
  kicad-build:
    name: KiCad · Generate & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install kiutils
        run: pip install kiutils

      - name: Generate control board schematic
        run: python3 kicad/generate_control_board.py

      - name: Validate control board (9 checks, 326 pin assignments)
        run: python3 kicad/validate_schematic.py kicad/pogo-control-board.kicad_sch

      - name: Generate utility board schematic
        run: python3 kicad/generate_utility_board.py

      - name: Validate utility board (7 checks, 477 coordinate-verified pin assignments)
        run: python3 kicad/validate_utility_board.py kicad/pogo-utility-board.kicad_sch

      - name: Upload schematic artifact
        uses: actions/upload-artifact@v7
        with:
          name: POGO-kicad-${{ github.run_number }}
          path: |
            kicad/*.kicad_sch
            kicad/*.kicad_pro
          if-no-files-found: error
          retention-days: 30
