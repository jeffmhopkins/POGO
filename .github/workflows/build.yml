name: Build VCV Rack Plugin

# Triggers: every push to the dev branch or main, every PR, and manual dispatch
on:
  push:
    branches:
      - main
      - dev
      - "claude/**"
  pull_request:
  workflow_dispatch:

env:
  rack-plugin-toolchain-dir: /home/build/rack-plugin-toolchain

defaults:
  run:
    shell: bash

jobs:
  # ─── Linux x64 (fastest; used for development feedback) ───────────────────
  build-linux:
    name: Build · Linux x64
    runs-on: ubuntu-latest
    # Community-maintained toolchain image — SDK + cross-compilers pre-installed.
    # Canonical reference: github.com/qno/vcv-plugin-github-actions-example
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        run: |
          export PLUGIN_DIR=$GITHUB_WORKSPACE
          pushd ${{ env.rack-plugin-toolchain-dir }}
          make plugin-build-lin-x64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-linux-x64-${{ github.run_number }}
          path: ${{ env.rack-plugin-toolchain-dir }}/plugin-build
          if-no-files-found: warn
          retention-days: 30

  # ─── KiCad schematic generation + validation ──────────────────────────────
  kicad-build:
    name: KiCad · Generate & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kiutils
        run: pip install kiutils

      - name: Generate control board schematic
        run: python3 kicad/generate_control_board.py

      - name: Validate control board (9 checks, 326 pin assignments)
        run: python3 kicad/validate_schematic.py kicad/pogo-control-board.kicad_sch

      - name: Generate utility board schematic
        run: python3 kicad/generate_utility_board.py

      - name: Validate utility board (11 checks, 173 nets)
        run: python3 kicad/validate_utility_board.py kicad/pogo-utility-board.kicad_sch

      - name: Upload schematic artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-kicad-${{ github.run_number }}
          path: |
            kicad/*.kicad_sch
            kicad/*.kicad_pro
          if-no-files-found: error
          retention-days: 30
