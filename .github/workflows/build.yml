name: Build VCV Rack Plugin

# Triggers: every push to the dev branch or main, every PR, and manual dispatch
on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
  workflow_dispatch:

env:
  rack-plugin-toolchain-dir: /home/build/rack-plugin-toolchain

defaults:
  run:
    shell: bash

jobs:
  # ─── Linux x64 (fastest; used for development feedback) ───────────────────
  build-linux:
    name: Build · Linux x64
    runs-on: ubuntu-latest
    # Community-maintained toolchain image — SDK + cross-compilers pre-installed.
    # Canonical reference: github.com/qno/vcv-plugin-github-actions-example
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin
        run: |
          export PLUGIN_DIR=$GITHUB_WORKSPACE
          pushd ${{ env.rack-plugin-toolchain-dir }}
          make plugin-build-lin-x64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-linux-x64-${{ github.run_number }}
          path: ${{ env.rack-plugin-toolchain-dir }}/plugin-build
          if-no-files-found: warn
          retention-days: 30
