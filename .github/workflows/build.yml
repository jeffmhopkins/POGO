name: Build VCV Rack Plugin

# Triggers: every push to the dev branch or main, every PR, and manual dispatch
on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
  workflow_dispatch:

jobs:
  # ─── Linux x64 (fastest; used for development feedback) ───────────────────
  build-linux:
    name: Build · Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Rack 2 SDK
        run: |
          curl -fsSL -o Rack-SDK.zip \
            "https://vcvrack.com/downloads/Rack-SDK-2.6-lin-x64.zip"
          unzip -q Rack-SDK.zip
          echo "RACK_DIR=$GITHUB_WORKSPACE/Rack-SDK" >> "$GITHUB_ENV"

      - name: Build plugin
        run: make -j$(nproc) dist

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-linux-x64-${{ github.run_number }}
          path: dist/
          if-no-files-found: warn
          retention-days: 30
