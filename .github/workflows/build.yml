name: Build VCV Rack Plugin

# Triggers: every push to the dev branch or main, every PR, and manual dispatch
on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
  workflow_dispatch:

jobs:
  # ─── Linux x64 (fastest; used for development feedback) ───────────────────
  build-linux:
    name: Build · Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Rack 2 SDK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # VCVRack/Rack uses git tags (no GitHub Releases).
          # Get the latest v2.x tag, then download the SDK from vcvrack.com.
          LATEST_TAG=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/VCVRack/Rack/tags?per_page=5" \
            | jq -r 'first(.[] | select(.name | test("^v2\\.")) | .name)')

          LATEST_VERSION="${LATEST_TAG#v}"
          echo "Latest Rack tag: $LATEST_TAG"

          # Try the latest version, then fall back to known-stable releases.
          SDK_URL=""
          for VERSION in "$LATEST_VERSION" "2.5.2" "2.4.1"; do
            CANDIDATE="https://vcvrack.com/downloads/Rack-SDK-${VERSION}-lin-x64.zip"
            echo "Trying: $CANDIDATE"
            if curl -fsSL -o Rack-SDK.zip "$CANDIDATE" 2>/dev/null; then
              SDK_URL="$CANDIDATE"
              echo "Downloaded SDK v${VERSION}"
              break
            fi
            echo "  -> not found, trying next version"
            rm -f Rack-SDK.zip
          done

          if [ -z "$SDK_URL" ]; then
            echo "ERROR: All SDK download attempts failed."
            exit 1
          fi

          unzip -q Rack-SDK.zip
          SDK_DIR=$(find . -maxdepth 1 -type d -name "Rack-SDK*" | head -1)
          if [ -z "$SDK_DIR" ]; then
            echo "ERROR: No Rack-SDK* directory after unzip. Contents:"
            ls -la
            exit 1
          fi
          echo "SDK directory: $SDK_DIR"
          echo "RACK_DIR=$GITHUB_WORKSPACE/${SDK_DIR#./}" >> "$GITHUB_ENV"

      - name: Build plugin
        run: make -j$(nproc) dist

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-linux-x64-${{ github.run_number }}
          path: dist/
          if-no-files-found: warn
          retention-days: 30
