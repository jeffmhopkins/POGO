name: Build VCV Rack Plugin

# Triggers: every push to the dev branch or main, every PR, and manual dispatch
on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
  workflow_dispatch:

jobs:
  # ─── Linux x64 (fastest; used for development feedback) ───────────────────
  build-linux:
    name: Build · Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Rack 2 SDK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ── Strategy 1: GitHub Releases API ───────────────────────────────
          echo "=== GitHub releases for VCVRack/Rack ==="
          RELEASES=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/VCVRack/Rack/releases?per_page=10")

          # Print whatever the API returned — object type tells us if it's an
          # error message vs. an empty/populated releases array.
          echo "$RELEASES" | jq -r '
            if type == "array" then
              if length == 0 then "  (empty — no GitHub Releases on this repo)"
              else .[] | "  tag=\(.tag_name)  pre=\(.prerelease)  assets=[\(.assets | map(.name) | join(", "))]"
              end
            else "  API response is not an array: \(. | tojson | .[0:300])"
            end
          ' 2>&1

          SDK_URL=$(echo "$RELEASES" | jq -r '
            if type == "array" then
              first(
                .[] | .assets[] |
                select(.name | ascii_downcase |
                  (contains("sdk") and contains("lin") and contains("x64") and endswith(".zip"))
                ) | .browser_download_url
              ) // ""
            else "" end
          ' 2>/dev/null)

          # ── Strategy 2: GitHub Tags API → construct download URL ──────────
          if [ -z "$SDK_URL" ]; then
            echo ""
            echo "=== GitHub tags for VCVRack/Rack ==="
            TAGS=$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/VCVRack/Rack/tags?per_page=20")

            echo "$TAGS" | jq -r '
              if type == "array" then
                if length == 0 then "  (no tags found)"
                else .[] | "  \(.name)"
                end
              else "  Error: \(. | tojson | .[0:200])"
              end
            ' 2>&1 | head -20

            LATEST_TAG=$(echo "$TAGS" | jq -r '
              first(.[] | select(.name | test("^v?2\\.")) | .name) // ""
            ' 2>/dev/null)

            if [ -n "$LATEST_TAG" ]; then
              VERSION="${LATEST_TAG#v}"
              SDK_URL="https://github.com/VCVRack/Rack/releases/download/${LATEST_TAG}/Rack-SDK-${VERSION}-lin-x64.zip"
              echo "Constructed URL from tag ${LATEST_TAG}: $SDK_URL"
            fi
          fi

          if [ -z "$SDK_URL" ]; then
            echo "ERROR: Could not locate or construct a Rack 2 SDK URL."
            exit 1
          fi

          echo ""
          echo "Downloading: $SDK_URL"
          curl -fsSL -o Rack-SDK.zip "$SDK_URL"
          unzip -q Rack-SDK.zip

          # The zip may extract to Rack-SDK/ or Rack-SDK-x.x.x/
          SDK_DIR=$(find . -maxdepth 1 -type d -name "Rack-SDK*" | head -1)
          if [ -z "$SDK_DIR" ]; then
            echo "ERROR: No Rack-SDK* directory after unzip. Contents:"
            ls -la
            exit 1
          fi
          echo "SDK directory: $SDK_DIR"
          echo "RACK_DIR=$GITHUB_WORKSPACE/${SDK_DIR#./}" >> "$GITHUB_ENV"

      - name: Build plugin
        run: make -j$(nproc) dist

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-linux-x64-${{ github.run_number }}
          path: dist/
          if-no-files-found: warn
          retention-days: 30
