name: Build VCV Rack Plugin

# Triggers: every push to the dev branch or main, every PR, and manual dispatch
on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
  workflow_dispatch:

jobs:
  # ─── Linux x64 (fastest; used for development feedback) ───────────────────
  build-linux:
    name: Build · Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Rack 2 SDK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch the latest stable Rack 2.x release from the GitHub API and
          # grab the Linux x64 SDK asset URL.
          SDK_URL=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/VCVRack/Rack/releases" \
            | jq -r '[.[] | select(.prerelease == false)
                           | select(.tag_name | startswith("v2."))
                     ][0].assets[]
                     | select(.name | test("SDK.*lin.*x64.*\\.zip$"; "i"))
                     | .browser_download_url')

          if [ -z "$SDK_URL" ] || [ "$SDK_URL" = "null" ]; then
            echo "ERROR: Could not locate a Rack 2 Linux x64 SDK asset."
            exit 1
          fi

          echo "Downloading SDK: $SDK_URL"
          curl -fsSL -o Rack-SDK.zip "$SDK_URL"
          unzip -q Rack-SDK.zip
          echo "RACK_DIR=$GITHUB_WORKSPACE/Rack-SDK" >> "$GITHUB_ENV"

      - name: Build plugin
        run: make -j$(nproc) dist

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: POGO-linux-x64-${{ github.run_number }}
          path: dist/
          if-no-files-found: warn
          retention-days: 30
