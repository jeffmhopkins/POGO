# POGO Shared-Q sheet — LP1/LP2 resonance VCAs (U9 L, U10 R) — schematic netlist
#
# Source of truth, transcribed from:
#   specs/components.yaml  (block-Q rows: U9, U10, C48, C49, C54-C57)
#   specs/aux/aux-q-control.md  (LM13700 Q-feedback cell; In+ <- v1/BP,
#                                In- & Out -> SUM_AMP virtual ground, Iabc = Iabc_q)
#   specs/block-5/spec.md, specs/block-8/spec.md (cell A = LP1, cell B = LP2)
#   datasheet-corrected pinout: kicad_common.py sym_lm13700
#
# This sheet OWNS the two shared Q-VCA LM13700s:
#   U9  = L-channel Q VCA:  cell A = LP1 Q (L),  cell B = LP2 Q (L)
#   U10 = R-channel Q VCA:  cell A = LP1 Q (R),  cell B = LP2 Q (R)
# plus their supply decoupling (C54-C57) and the LP1 Q-cell Iabc bypass (C48/C49).
#
# Q-feedback OTA cell wiring (per aux-q-control.md):
#   In+  <- v_BP (v1) of the owning filter         (BP/integrator-1 node)
#   In-  -> SUM_AMP virtual ground (the summing node of that filter's SUM_AMP)
#   Out  -> SUM_AMP virtual ground (same node; injects the damping current)
#   Iabc <- V_ires via R_Iabc (lives in the filter block; arrives as boundary)
# The Darlington output buffer of each cell is unused here (pins 7/8, 9/10 -> NC),
# as is the linearizing-diode bias (pins 2/15 -> NC).
#
# Cell-A nets (LP1_*) are owned/driven from block-5. Cell-B nets (LP2_*) are
# joined later by block-8; here they are boundary nets to U9/U10 cell B.

block: shared-q
board: audio
title: POGO Shared-Q - LP1/LP2 resonance VCAs (U9/U10)

parts:
  U9:  { sym: ota, part: LM13700M, value: LM13700 }   # L Q VCA: A=LP1 Q, B=LP2 Q
  U10: { sym: ota, part: LM13700M, value: LM13700 }   # R Q VCA: A=LP1 Q, B=LP2 Q
  C48: { sym: c, value: 10nF }    # LP1 Q-cell Iabc bypass L (C0G)
  C49: { sym: c, value: 10nF }    # LP1 Q-cell Iabc bypass R
  C54: { sym: c, value: 100nF }   # U9 V+
  C55: { sym: c, value: 100nF }   # U9 V-
  C56: { sym: c, value: 100nF }   # U10 V+
  C57: { sym: c, value: 100nF }   # U10 V-

nets:
  # ---- power (LM13700 V+ = 11, V- = 6) ----
  "+12V":  [U9.11, U10.11, C54.1, C56.1]
  "-12V":  [U9.6, U10.6, C55.1, C57.1]
  GND:     [C48.2, C49.2, C54.2, C55.2, C56.2, C57.2]

  # ---- U9 (L channel) ----
  # cell A = LP1 Q (L)
  LP1_V1_L:     [U9.3]            # In+_A <- LP1 v1/BP (boundary from block-5)
  LP1_SUMINV_L: [U9.4, U9.5]      # In-_A + Out_A -> LP1 SUM_AMP virtual ground (boundary)
  LP1_QIABC_L:  [U9.1, C48.1]     # Iabc_A <- LP1 V_ires/R_Iabc (boundary) + bypass
  # cell B = LP2 Q (L) — joined by block-8
  LP2_V1_L:     [U9.14]           # In+_B <- LP2 v1/BP (boundary)
  LP2_SUMINV_L: [U9.13, U9.12]    # In-_B + Out_B -> LP2 SUM_AMP virtual ground (boundary)
  LP2_QIABC_L:  [U9.16]           # Iabc_B <- LP2 V_ires/R_Iabc (boundary)

  # ---- U10 (R channel) ----
  # cell A = LP1 Q (R)
  LP1_V1_R:     [U10.3]
  LP1_SUMINV_R: [U10.4, U10.5]
  LP1_QIABC_R:  [U10.1, C49.1]
  # cell B = LP2 Q (R)
  LP2_V1_R:     [U10.14]
  LP2_SUMINV_R: [U10.13, U10.12]
  LP2_QIABC_R:  [U10.16]

no_connect:
  # Q-cell Darlington output buffers unused (both channels, both cells).
  - U9.7
  - U9.8
  - U9.9
  - U9.10
  - U10.7
  - U10.8
  - U10.9
  - U10.10
  # Linearizing-diode bias pins unused.
  - U9.2
  - U9.15
  - U10.2
  - U10.15

boundary:
  - LP1_V1_L      # <- block-5 (LP1 v1/BP, L)
  - LP1_V1_R      # <- block-5 (LP1 v1/BP, R)
  - LP1_SUMINV_L  # <-> block-5 (LP1 SUM_AMP virtual ground, L)
  - LP1_SUMINV_R  # <-> block-5 (LP1 SUM_AMP virtual ground, R)
  - LP1_QIABC_L   # <- block-5 (LP1 Q Iabc, L)
  - LP1_QIABC_R   # <- block-5 (LP1 Q Iabc, R)
  - LP2_V1_L      # <- block-8 (LP2 v1/BP, L)
  - LP2_V1_R      # <- block-8 (LP2 v1/BP, R)
  - LP2_SUMINV_L  # <-> block-8 (LP2 SUM_AMP virtual ground, L)
  - LP2_SUMINV_R  # <-> block-8 (LP2 SUM_AMP virtual ground, R)
  - LP2_QIABC_L   # <- block-8 (LP2 Q Iabc, L)
  - LP2_QIABC_R   # <- block-8 (LP2 Q Iabc, R)
