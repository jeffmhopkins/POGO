# POGO Block 7 — HP Filter (stereo 2-pole OTA-C SVF, highpass, mono/no tilt)
#
# Source of truth, transcribed from:
#   specs/components.yaml (block-7 rows; BOM authoritative, refs exact)
#   specs/block-7/spec.md (§2-§4) ; aux-ota-c-svf / aux-q-control / aux-expo-converter
#   datasheet-corrected pinouts: kicad_common.py sym_lm13700 / sym_that340 / sym_opa1612
#
# Structure = LP2 (block-8) topology with two HP differences:
#   1. OUTPUT IS HP: the SUM_AMP output (HP_inv) is taken through a G=-1 inverting
#      buffer (OPA1612 half B) to restore polarity -> HP_OUT. (LP2 used half B as a
#      unity LP buffer on v2; here v2 only feeds back.)
#   2. OWN Q VCAs: U51 (L) / U52 (R), cell A = HP Q; cell B spare, terminated
#      (In± -> GND, Out -> R_QB_OUT -> GND, Iabc -> R_QB_IABC -> GND, buffers/diode NC).
# Single shared expo (U55) drives both integrator channels (HP has no tilt).
# Own IRES_AMP (U66). Integrator Darlington buffers (v1/v2) get pulldowns to V-.
# Input = BP block output; output -> LP2 (block-8).

block: block-7
board: audio
title: POGO Block 7 - HP Filter (OTA-C SVF, mono)

parts:
  U49: { sym: ota, part: LM13700M, value: LM13700 }   # HP integrators L
  U50: { sym: ota, part: LM13700M, value: LM13700 }   # HP integrators R
  U51: { sym: ota, part: LM13700M, value: LM13700 }   # HP Q VCA L (cell A; cell B spare)
  U52: { sym: ota, part: LM13700M, value: LM13700 }   # HP Q VCA R (cell A; cell B spare)
  U53: { sym: opamp2, part: OPA1612, value: OPA1612 } # L: A=SUM_AMP, B=HP inv buffer
  U54: { sym: opamp2, part: OPA1612, value: OPA1612 } # R: A=SUM_AMP, B=HP inv buffer
  U66: { sym: opamp2, part: TL072CDT, value: TL072 }  # A=IRES_AMP, B=spare
  U55: { sym: expo, part: THAT340S14-U, value: THAT340 }  # shared L+R expo (no tilt)

  C29A: { sym: c, value: 47nF }   # C1 L
  C29B: { sym: c, value: 47nF }   # C2 L
  C29C: { sym: c, value: 47nF }   # C1 R
  C29D: { sym: c, value: 47nF }   # C2 R

  R30: { sym: r, value: 100k }    # R_in L
  R31: { sym: r, value: 100k }    # R_in R
  R92: { sym: r, value: 100k }    # R_FB L (v2 feedback)
  R93: { sym: r, value: 100k }    # R_FB R
  R94: { sym: r, value: 100k }    # R_f L (SUM_AMP feedback)
  R95: { sym: r, value: 100k }    # R_f R
  R96: { sym: r, value: 1k }      # R_LIN OTA1 L
  R97: { sym: r, value: 1k }      # R_LIN OTA2 L
  R98: { sym: r, value: 1k }      # R_LIN OTA1 R
  R99: { sym: r, value: 1k }      # R_LIN OTA2 R
  R100: { sym: r, value: 100k }   # HP inv buffer R_in L
  R101: { sym: r, value: 100k }   # HP inv buffer R_in R
  R102: { sym: r, value: 100k }   # HP inv buffer R_f L
  R103: { sym: r, value: 100k }   # HP inv buffer R_f R
  R104: { sym: r, value: 1M }     # R_Iabc L (V_ires -> U51 cellA Iabc)
  R105: { sym: r, value: 1M }     # R_Iabc R (V_ires -> U52 cellA Iabc)
  R106: { sym: r, value: 100k }   # R_QBIAS
  R107: { sym: r, value: 100k }   # R_QINV
  R108: { sym: r, value: 100k }   # R_f_q
  R109: { sym: r, value: 1M }     # R_IREF_A
  R110: { sym: r, value: 47k }    # R_VOCT
  R111: { sym: r, value: 1k }     # R_E
  R112: { sym: r, value: 10k }    # v1 L buffer pulldown
  R113: { sym: r, value: 10k }    # v2 L buffer pulldown
  R114: { sym: r, value: 10k }    # v1 R buffer pulldown
  R115: { sym: r, value: 10k }    # v2 R buffer pulldown
  R_QB_IABC_L: { sym: r, value: 100k }  # U51 cell B Iabc termination to GND
  R_QB_IABC_R: { sym: r, value: 100k }  # U52 cell B Iabc termination
  R_QB_OUT_L:  { sym: r, value: 1k }    # U51 cell B Out termination to GND
  R_QB_OUT_R:  { sym: r, value: 1k }    # U52 cell B Out termination

  RV16: { sym: trimpot, part: "Bourns 3224W", value: HP_FREF }
  RV17: { sym: trimpot, part: "Bourns 3224W", value: HP_1VOCT }
  RV18: { sym: trimpot, part: "Bourns 3224W", value: HP_QMAX }

  D12: { sym: diode, part: 1N4148W, value: 1N4148W }

  C86: { sym: c, value: 100nF }   # C_IREF
  C87: { sym: c, value: 10nF }    # C_IABC L
  C88: { sym: c, value: 10nF }    # C_IABC R
  C89: { sym: c, value: 10nF }    # C_IABC_Q L (U51 cellA)
  C90: { sym: c, value: 10nF }    # C_IABC_Q R (U52 cellA)
  C91: { sym: c, value: 100nF }   # U49 V+
  C92: { sym: c, value: 100nF }   # U49 V-
  C93: { sym: c, value: 100nF }   # U50 V+
  C94: { sym: c, value: 100nF }   # U50 V-
  C95: { sym: c, value: 100nF }   # U51 V+
  C96: { sym: c, value: 100nF }   # U51 V-
  C97: { sym: c, value: 100nF }   # U52 V+
  C98: { sym: c, value: 100nF }   # U52 V-
  C99: { sym: c, value: 100nF }   # U53 V+
  C100: { sym: c, value: 100nF }  # U53 V-
  C101: { sym: c, value: 100nF }  # U54 V+
  C102: { sym: c, value: 100nF }  # U54 V-
  C103: { sym: c, value: 100nF }  # U55 +12V rail bypass
  C104: { sym: c, value: 100nF }  # U55 -12V rail bypass
  C105: { sym: c, value: 100nF }  # U66 V+
  C106: { sym: c, value: 100nF }  # U66 V-

nets:
  "+12V":
    [U49.11, U50.11, U51.11, U52.11, U53.8, U54.8, U66.8,
     R109.1, RV18.3,
     C91.1, C93.1, C95.1, C97.1, C99.1, C101.1, C103.1, C105.1]
  "-12V":
    [U49.6, U50.6, U51.6, U52.6, U53.4, U54.4, U66.4,
     U55.4, U55.11, R111.2,
     R112.2, R113.2, R114.2, R115.2,
     C92.1, C94.1, C96.1, C98.1, C100.1, C102.1, C104.1, C106.1]
  GND:
    [U53.3, U53.5, U54.3, U54.5, U66.3, RV18.1,
     R96.2, R97.2, R98.2, R99.2,
     C29A.2, C29B.2, C29C.2, C29D.2,
     D12.A,
     R_QB_IABC_L.2, R_QB_IABC_R.2, R_QB_OUT_L.2, R_QB_OUT_R.2,
     U51.13, U51.14, U52.13, U52.14,
     C86.2, C87.2, C88.2, C89.2, C90.2,
     C91.2, C92.2, C93.2, C94.2, C95.2, C96.2, C97.2, C98.2,
     C99.2, C100.2, C101.2, C102.2, C103.2, C104.2, C105.2, C106.2]

  # ---- L channel SVF ----
  BP_OUT_L:     [R30.1]                       # <- block-6 BP out L (boundary)
  HP_SUMINV_L:  [U53.2, R30.2, R92.2, R94.1, U51.4, U51.5]  # SUM_AMP virtual ground (+ Q-cell A In-/Out)
  HP_HPINV_L:   [U53.1, R94.2, U49.3, R100.1] # SUM_AMP out (HP_inv) -> OTA1 In+ + inv-buffer in
  HP_V1CAP_L:   [U49.5, U49.7, C29A.1]
  HP_V1_L:      [U49.8, U49.14, R112.1, U51.3]  # v1 -> OTA2 In+ + pulldown + Q-cell In+
  HP_V2CAP_L:   [U49.12, U49.10, C29B.1]
  HP_V2_L:      [U49.9, R92.1, R113.1]        # v2 (LP) -> R_FB feedback + pulldown (not output)
  HP_INVBUF_L:  [U53.6, R100.2, R102.1]       # HP inverting buffer virtual ground
  HP_OUT_L:     [U53.7, R102.2]               # HP out (polarity-restored) -> block-8 (boundary)

  # ---- R channel SVF ----
  BP_OUT_R:     [R31.1]                        # <- block-6 BP out R (boundary)
  HP_SUMINV_R:  [U54.2, R31.2, R93.2, R95.1, U52.4, U52.5]
  HP_HPINV_R:   [U54.1, R95.2, U50.3, R101.1]
  HP_V1CAP_R:   [U50.5, U50.7, C29C.1]
  HP_V1_R:      [U50.8, U50.14, R114.1, U52.3]
  HP_V2CAP_R:   [U50.12, U50.10, C29D.1]
  HP_V2_R:      [U50.9, R93.1, R115.1]
  HP_INVBUF_R:  [U54.6, R101.2, R103.1]
  HP_OUT_R:     [U54.7, R103.2]

  # ---- OTA linearizing R (integrator In- pins) ----
  HP_LIN_A_L:   [U49.4, R96.1]
  HP_LIN_B_L:   [U49.13, R97.1]
  HP_LIN_A_R:   [U50.4, R98.1]
  HP_LIN_B_R:   [U50.13, R99.1]

  # ---- Q cell A Iabc + cell B spare termination ----
  HP_QIABC_L:   [U51.1, R104.2, C89.1]        # U51 cellA Iabc (HP Q L)
  HP_QIABC_R:   [U52.1, R105.2, C90.1]        # U52 cellA Iabc (HP Q R)
  HP_QB_IABC_L: [U51.16, R_QB_IABC_L.1]       # cell B spare Iabc -> R -> GND
  HP_QB_IABC_R: [U52.16, R_QB_IABC_R.1]
  HP_QB_OUT_L:  [U51.12, R_QB_OUT_L.1]        # cell B spare Out -> R -> GND
  HP_QB_OUT_R:  [U52.12, R_QB_OUT_R.1]

  # ---- expo converter (single shared L+R; no tilt) ----
  HP_VCTRL:     [R110.1]                       # <- control: HP V/oct CV (boundary)
  HP_VOCT_TR:   [R110.2, RV17.1, RV17.2]
  HP_EXPO_BASE: [U55.2, RV17.3]
  HP_IABC:      [U55.1, U49.1, U49.16, U50.1, U50.16, C87.1, C88.1]  # shared Iabc -> both OTAs
  HP_EXPO_EMIT: [U55.3, U55.12, R111.1]
  HP_IREF:      [U55.14, U55.13, RV16.3, C86.1]
  HP_IREF_TR:   [R109.2, RV16.1, RV16.2]

  # ---- IRES_AMP / Q driver (U66 half A) ----
  HP_VBIAS:     [RV18.2, R106.1]
  HP_RES:       [R107.1]                       # resonance CV in (boundary)
  HP_IRES_SUM:  [U66.2, R106.2, R107.2, R108.1]
  HP_VIRES:     [U66.1, R108.2, D12.K, R104.1, R105.1]  # V_ires (>=0 by D12) -> R_Iabc L+R

no_connect:
  # LM13700 integrator linearizing-diode bias pins unused.
  - U49.2
  - U49.15
  - U50.2
  - U50.15
  # Q-cell LM13700s: Darlington buffers + diode-bias unused (both cells, both ICs).
  - U51.2
  - U51.7
  - U51.8
  - U51.9
  - U51.10
  - U51.15
  - U52.2
  - U52.7
  - U52.8
  - U52.9
  - U52.10
  - U52.15
  # THAT340 PNP transistors Q3 (5,6,7) and Q4 (8,9,10) unused.
  - U55.5
  - U55.6
  - U55.7
  - U55.8
  - U55.9
  - U55.10
  # U66 half B spare.
  - U66.5
  - U66.6
  - U66.7

boundary:
  - BP_OUT_L      # <- block-6 (BP out L = HP input)
  - BP_OUT_R      # <- block-6 (BP out R)
  - HP_OUT_L      # -> block-8 (HP out L = LP2 input)
  - HP_OUT_R      # -> block-8 (HP out R)
  - HP_VCTRL      # <- control: HP V/oct frequency CV
  - HP_RES        # <- control/mod: HP resonance CV
