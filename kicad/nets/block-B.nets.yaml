# POGO Block B — Output Buffers (MAIN_L/R + BP3_L/R) — schematic netlist
#
# Source of truth for connectivity, transcribed from:
#   specs/components.yaml  (block-B rows: U61/U62, R34-R37, J29/J30 — BOM authoritative)
#   plugin/src/Pogo.cpp    (OutputId enum + process(): MAIN/BP3 clamp ±11V)
#   specs/block-B/spec.md §1 (panel-verified intent), specs/aux/aux-unity-buffer.md
#
# Scope note (reconciled against ground truth): block-B is the MAIN output buffers
# (U61: MAIN_L/R) and the BP3 tap buffers (U62: BP3_L/R) plus their 1kΩ series
# resistors. Only the MAIN jacks (J29/J30) are scoped here. The BP3 output jacks
# (J27/J28) belong to block-6 and the LFO jacks (J5/J6) to block-2, so the BP3
# buffer outputs and all four buffer inputs are boundary nets (joined at board
# level by matching net name). The STALE spec §4 table's symbolic refs (U_MAIN,
# R_MAIN_L, ...) and its 6-jack listing predate this ref scheme — components.yaml
# is authoritative.
#
# DRIFT FLAGGED: components.yaml lists no decoupling caps for U61/U62, whereas
# block-A allocates 2x 100nF per dual op-amp. Not invented here (would create
# refs absent from the BOM). Recommend adding 4x 100nF decoupling rows to
# components.yaml; until then this netlist ties V+/V- straight to the rails.

block: block-B
board: audio
title: POGO Block B - Output Buffers (MAIN + BP3)

parts:
  U61: { sym: opamp2, part: TL072CDT, value: TL072 }   # MAIN_L (A) + MAIN_R (B)
  U62: { sym: opamp2, part: TL072CDT, value: TL072 }   # BP3_L  (A) + BP3_R  (B)
  R34: { sym: r, value: 1k }                            # MAIN_L series protection
  R35: { sym: r, value: 1k }                            # MAIN_R series protection
  R36: { sym: r, value: 1k }                            # BP3_L  series protection
  R37: { sym: r, value: 1k }                            # BP3_R  series protection
  J29: { sym: jack, part: PJ301M-12, value: MAIN_L }
  J30: { sym: jack, part: PJ301M-12, value: MAIN_R }

nets:
  "+12V":     [U61.8, U62.8]               # op-amp V+
  "-12V":     [U61.4, U62.4]               # op-amp V-
  GND:        [J29.2, J30.2]               # MAIN jack sleeves

  # MAIN path: LP2 -> U61 follower (G=+1) -> 1kΩ -> jack
  LP2_OUT_L:  [U61.3]                       # <- block-8 LP2 out L (boundary)
  LP2_OUT_R:  [U61.5]                       # <- block-8 LP2 out R (boundary)
  MAIN_L_BUF: [U61.1, U61.2, R34.1]        # U61A out=In- feedback -> R34
  MAIN_R_BUF: [U61.7, U61.6, R35.1]        # U61B out=In- feedback -> R35
  MAIN_L_OUT: [R34.2, J29.1]               # -> MAIN_L jack tip
  MAIN_R_OUT: [R35.2, J30.1]               # -> MAIN_R jack tip

  # BP3 tap path: BP3 group tap -> U62 follower -> 1kΩ -> jack (jack in block-6)
  BP3_TAP_L:  [U62.3]                       # <- block-6 BP3 tap L (boundary)
  BP3_TAP_R:  [U62.5]                       # <- block-6 BP3 tap R (boundary)
  BP3_L_BUF:  [U62.1, U62.2, R36.1]        # U62A out=In- feedback -> R36
  BP3_R_BUF:  [U62.7, U62.6, R37.1]        # U62B out=In- feedback -> R37
  BP3_L_OUT:  [R36.2]                       # -> block-6 J27 (BP3_L jack) (boundary)
  BP3_R_OUT:  [R37.2]                       # -> block-6 J28 (BP3_R jack) (boundary)

# Output jacks do not normal; switch lug unused.
no_connect:
  - J29.3
  - J30.3

# Nets crossing the sheet boundary (joined at board level by name).
boundary:
  - LP2_OUT_L    # from block-8 (LP2)
  - LP2_OUT_R    # from block-8 (LP2)
  - BP3_TAP_L    # from block-6 (BP3 group tap)
  - BP3_TAP_R    # from block-6 (BP3 group tap)
  - BP3_L_OUT    # to   block-6 (J27 BP3_L jack)
  - BP3_R_OUT    # to   block-6 (J28 BP3_R jack)
