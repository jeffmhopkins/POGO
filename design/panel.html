<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POGO — 40 HP Panel Layout</title>
<style>
  body { background: #000; margin: 0; padding: 1.5rem; font-family: monospace; }
  h1 { color: #00d4ff; font-size: 0.85rem; margin: 0 0 0.75rem 0; letter-spacing: 0.1em; }
  .wrap { max-width: 1500px; margin: 0 auto; }
  svg { display: block; width: 100%; border: 1px solid #222; }
  .note { color: #555; font-size: 0.7rem; margin-top: 0.5rem; }
</style>
</head>
<body>
<div class="wrap">
<h1>POGO — 40 HP PANEL LAYOUT  ·  1 HP = 5.08 mm  ·  1 Jack per 2 HP (10.16 mm pitch)  ·  Structure &amp; Labels</h1>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 203.20 133.35">

  <!-- ── PANEL BACKGROUND ─────────────────────────────────────────────────── -->
  <rect x="0" y="0" width="203.20" height="133.35" fill="#0d0d0d"/>
  <rect x="0" y="0"      width="203.20" height="4.5"  fill="#141414"/>
  <rect x="0" y="128.85" width="203.20" height="4.5"  fill="#141414"/>

  <!--
    JACK SPACING STANDARD: 1 jack per 2 HP = 10.16 mm pitch
    Jack centers in a 4 HP zone: x_zone + 5.08,  x_zone + 15.24
    Jack centers in a 6 HP zone: x_zone + 5.08,  x_zone + 15.24,  x_zone + 25.40

    HP ZONE BOUNDARIES
      Zone 0  (4 HP):  x =   0.00 –  20.32
      Zone 1  (6 HP):  x =  20.32 –  50.80
      Comb 1  (6 HP):  x =  50.80 –  81.28
      Comb 2  (6 HP):  x =  81.28 – 111.76
      Comb 3  (6 HP):  x = 111.76 – 142.24
      LP 1    (4 HP):  x = 142.24 – 162.56
      LP 2    (4 HP):  x = 162.56 – 182.88
      HP+OUT  (4 HP):  x = 182.88 – 203.20

    JACK POSITIONS (absolute x)
      Zone 0  (2 j per row):          5.08,  15.24
      Zone 1  (3 j, unified row):    25.40,  35.56,  45.72
      Comb 1  (3 j):                 55.88,  66.04,  76.20
      Comb 2  (3 j):                 86.36,  96.52, 106.68
      Comb 3  (3 j):                116.84, 127.00, 137.16
      LP 1    (2 j):                147.32, 157.48
      LP 2    (2 j per row):        167.64, 177.80
      HP+OUT  (2 j per row):        187.96, 198.12

    CYAN SEPARATOR POSITIONS — all at exact HP zone boundaries
    (midpoint between last jack of zone N and first jack of zone N+1 = exact HP boundary)
      Zone 0 | Zone 1:   (15.24 + 25.40) / 2 =  20.32
      Zone 1 | Comb 1:   (45.72 + 55.88) / 2 =  50.80
      Comb 3 | LP 1:    (137.16 + 147.32) / 2 = 142.24
      LP 1   | LP 2:    (157.48 + 167.64) / 2 = 162.56
      LP 2   | HP+OUT:  (177.80 + 187.96) / 2 = 182.88

    GRAY SUB-DIVIDER POSITIONS
      Comb 1 | Comb 2:   (76.20 + 86.36) / 2 =  81.28
      Comb 2 | Comb 3:  (106.68 + 116.84) / 2 = 111.76
  -->

  <!-- Mounting holes: M3, x=7.5 and x=195.70, y=5.1 and y=128.25 -->
  <circle cx="7.5"    cy="5.1"    r="1.6" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="195.70" cy="5.1"    r="1.6" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="7.5"    cy="128.25" r="1.6" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="195.70" cy="128.25" r="1.6" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="0.5"/>

  <!-- Module name (faint watermark) -->
  <text x="101.60" y="7.2" fill="#ffffff" font-family="monospace" font-size="4"
        font-weight="bold" text-anchor="middle" opacity="0.18">POGO</text>

  <!-- ── MAIN ZONE SEPARATOR LINES (cyan) — all at exact HP zone boundaries ── -->
  <!-- Zone 0 | Zone 1  x = 20.32 -->
  <line x1="20.32" y1="4.5" x2="20.32" y2="128.85" stroke="#00d4ff" stroke-width="0.5" opacity="0.55"/>
  <!-- Zone 1 | Comb 1  x = 50.80 -->
  <line x1="50.80" y1="4.5" x2="50.80" y2="128.85" stroke="#00d4ff" stroke-width="0.5" opacity="0.55"/>
  <!-- Comb 3 | LP 1  x = 142.24 -->
  <line x1="142.24" y1="4.5" x2="142.24" y2="128.85" stroke="#00d4ff" stroke-width="0.5" opacity="0.55"/>
  <!-- LP 1 | LP 2  x = 162.56 -->
  <line x1="162.56" y1="4.5" x2="162.56" y2="128.85" stroke="#00d4ff" stroke-width="0.5" opacity="0.55"/>
  <!-- LP 2 | HP+OUT  x = 182.88 -->
  <line x1="182.88" y1="4.5" x2="182.88" y2="128.85" stroke="#00d4ff" stroke-width="0.5" opacity="0.55"/>

  <!-- ── COMB GROUP SUB-DIVIDERS (dim gray vertical) ──────────────────────── -->
  <!-- Comb 1 | Comb 2  x = 81.28 -->
  <line x1="81.28"  y1="4.5" x2="81.28"  y2="128.85" stroke="#2a2a2a" stroke-width="0.4"/>
  <!-- Comb 2 | Comb 3  x = 111.76 -->
  <line x1="111.76" y1="4.5" x2="111.76" y2="128.85" stroke="#2a2a2a" stroke-width="0.4"/>

  <!-- ── ZONE 0 MINI-ZONE DIVIDERS (dim gray horizontal) ──────────────────── -->
  <line x1="0.5"  y1="38.5" x2="19.82" y2="38.5" stroke="#2d2d2d" stroke-width="0.5"/>
  <line x1="0.5"  y1="89.5" x2="19.82" y2="89.5" stroke="#2d2d2d" stroke-width="0.5"/>

  <!-- ── ZONE 1: COMB / DIST SUBSECTION DIVIDER (horizontal) ─────────────── -->
  <line x1="20.82" y1="74" x2="50.30" y2="74" stroke="#2d2d2d" stroke-width="0.5"/>

  <!-- ── LP2+HP+OUT ZONE: TOP STRIP / FILTER SECTION DIVIDER ─────────────── -->
  <line x1="162.56" y1="28" x2="203.20" y2="28" stroke="#2d2d2d" stroke-width="0.5"/>

  <!-- ════════════════════════════════════════════════════════════════════════ -->
  <!-- ZONE LABELS  (centered at zone x-centers, independent of cyan lines)   -->
  <!-- Zone x-centers: Z0=10.16  Z1=35.56  C1=66.04  C2=96.52  C3=127.00    -->
  <!--                 LP1=152.40  LP2=172.72  HP=193.04                      -->
  <!-- ════════════════════════════════════════════════════════════════════════ -->

  <!-- Zone 0a: INPUT / GAIN  (zone center x=10.16) -->
  <text x="10.16" y="9.0" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">INPUT / GAIN</text>

  <!-- Zone 0b: ENVELOPE -->
  <text x="10.16" y="43.5" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">ENVELOPE</text>

  <!-- Zone 0c: MOD BUS -->
  <text x="10.16" y="94" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">MOD BUS</text>

  <!-- Zone 1: SHARED  (zone center x=35.56) -->
  <text x="35.56" y="9.0" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">SHARED</text>
  <text x="35.56" y="15.5" fill="#4a6070" font-family="monospace" font-size="2.0"
        text-anchor="middle">— COMB —</text>
  <text x="35.56" y="78.5" fill="#4a6070" font-family="monospace" font-size="2.0"
        text-anchor="middle">— DIST —</text>

  <!-- Comb groups  (zone centers x=66.04, 96.52, 127.00) -->
  <text x="66.04"  y="9.0" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">COMB 1</text>
  <text x="66.04"  y="13.5" fill="#4a6070" font-family="monospace" font-size="1.6"
        text-anchor="middle">20Hz–2kHz</text>
  <text x="96.52"  y="9.0" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">COMB 2</text>
  <text x="96.52"  y="13.5" fill="#4a6070" font-family="monospace" font-size="1.6"
        text-anchor="middle">200Hz–8kHz</text>
  <text x="127.00" y="9.0" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">COMB 3</text>
  <text x="127.00" y="13.5" fill="#4a6070" font-family="monospace" font-size="1.6"
        text-anchor="middle">1kHz–20kHz</text>

  <!-- LP 1  (zone center x=152.40) -->
  <text x="152.40" y="9.0" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">LP 1</text>

  <!-- Zone 4+5 TOP STRIP labels (y=4.5–28) -->
  <!-- BAND OUT  (zone center x=172.72) -->
  <text x="172.72" y="9.0" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">BAND OUT</text>
  <!-- OUT  (zone center x=193.04) -->
  <text x="193.04" y="9.0" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">OUT</text>

  <!-- Zone 4+5 FILTER SECTION labels (y=28–128.85) -->
  <!-- LP 2  (zone center x=172.72) -->
  <text x="172.72" y="33" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">LP 2</text>
  <!-- HP  (zone center x=193.04) -->
  <text x="193.04" y="33" fill="#00d4ff" font-family="monospace" font-size="2.4"
        text-anchor="middle" font-weight="bold">HP</text>

  <!-- ════════════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 3 — ZONE 0c: MOD BUS  (x:0–20.32, y:89.5–128.85)             -->
  <!-- Block centered: knob top=98.5, jack label bottom=124.5, margins ~3.5mm -->
  <!-- ════════════════════════════════════════════════════════════════════════ -->

  <!-- AMOUNT knob — medium, x=5.08, y=103 -->
  <circle cx="5.08" cy="103" r="4.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="5.08" y1="103" x2="5.08" y2="99.5" stroke="#aaa" stroke-width="0.6"/>
  <text x="5.08" y="110.5" fill="#999" font-family="monospace" font-size="1.8" text-anchor="middle">AMOUNT</text>

  <!-- OFFSET knob — medium, x=15.24, y=103 -->
  <circle cx="15.24" cy="103" r="4.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="15.24" y1="103" x2="15.24" y2="99.5" stroke="#aaa" stroke-width="0.6"/>
  <text x="15.24" y="110.5" fill="#999" font-family="monospace" font-size="1.8" text-anchor="middle">OFFSET</text>

  <!-- MOD IN jack — primary mod source input, centered x=10.16, y=118 -->
  <circle cx="10.16" cy="118" r="3.5" fill="none" stroke="#555" stroke-width="0.6"/>
  <circle cx="10.16" cy="118" r="1.4" fill="#333" stroke="#666" stroke-width="0.4"/>
  <text x="10.16" y="124.5" fill="#888" font-family="monospace" font-size="1.8" text-anchor="middle">MOD IN</text>

  <!-- ════════════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 1 — ZONE 0a: INPUT / GAIN  (x:0–20.32, y:4.5–38.5)           -->
  <!-- ════════════════════════════════════════════════════════════════════════ -->

  <!-- L IN — audio input left -->
  <circle cx="5.08" cy="14" r="3.5" fill="none" stroke="#555" stroke-width="0.6"/>
  <circle cx="5.08" cy="14" r="1.4" fill="#333" stroke="#666" stroke-width="0.4"/>
  <text x="5.08" y="21.5" fill="#888" font-family="monospace" font-size="1.8" text-anchor="middle">L IN</text>

  <!-- R IN — audio input right -->
  <circle cx="15.24" cy="14" r="3.5" fill="none" stroke="#555" stroke-width="0.6"/>
  <circle cx="15.24" cy="14" r="1.4" fill="#333" stroke="#666" stroke-width="0.4"/>
  <text x="15.24" y="21.5" fill="#888" font-family="monospace" font-size="1.8" text-anchor="middle">R IN</text>

  <!-- GAIN switch — 2-pos vertical, center x=10.16, body y=23.5–32.5 -->
  <rect x="8.96" y="23.5" width="2.4" height="9" rx="1.2" fill="#222" stroke="#555" stroke-width="0.5"/>
  <!-- toggle slug at top position (1×) -->
  <rect x="8.76" y="24.0" width="2.8" height="3.5" rx="0.8" fill="#666" stroke="#888" stroke-width="0.3"/>
  <!-- position labels to the right -->
  <text x="13.0" y="26.5" fill="#3d5260" font-family="monospace" font-size="1.6" text-anchor="start">1×</text>
  <text x="13.0" y="32.5" fill="#3d5260" font-family="monospace" font-size="1.6" text-anchor="start">5×</text>
  <text x="10.16" y="37" fill="#999" font-family="monospace" font-size="1.8" text-anchor="middle">GAIN</text>

  <!-- ════════════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 2 — ZONE 0b: ENVELOPE  (x:0–20.32, y:38.5–89.5)              -->
  <!-- ════════════════════════════════════════════════════════════════════════ -->

  <!-- MOD SRC switch — 3-pos HORIZONTAL, body centered at x=10.16, y=51 -->
  <text x="10.16" y="48" fill="#3d5260" font-family="monospace" font-size="1.6" text-anchor="middle">MOD SRC</text>
  <rect x="4.16" y="49.8" width="12" height="2.4" rx="1.2" fill="#222" stroke="#555" stroke-width="0.5"/>
  <!-- toggle slug at center position (MAX) -->
  <rect x="8.41" y="49.6" width="3.5" height="2.8" rx="0.8" fill="#666" stroke="#888" stroke-width="0.3"/>
  <!-- position labels below switch -->
  <text x="6.16"  y="54.5" fill="#3d5260" font-family="monospace" font-size="1.6" text-anchor="middle">L</text>
  <text x="10.16" y="54.5" fill="#3d5260" font-family="monospace" font-size="1.6" text-anchor="middle">MAX</text>
  <text x="14.16" y="54.5" fill="#3d5260" font-family="monospace" font-size="1.6" text-anchor="middle">AVG</text>

  <!-- ATTACK knob — medium, x=5.08, y=64 (centered between switch and jacks) -->
  <circle cx="5.08" cy="64" r="4.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="5.08" y1="64" x2="5.08" y2="60.5" stroke="#aaa" stroke-width="0.6"/>
  <text x="5.08" y="71.5" fill="#999" font-family="monospace" font-size="1.8" text-anchor="middle">ATTACK</text>

  <!-- RELEASE knob — medium, x=15.24, y=64 -->
  <circle cx="15.24" cy="64" r="4.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="15.24" y1="64" x2="15.24" y2="60.5" stroke="#aaa" stroke-width="0.6"/>
  <text x="15.24" y="71.5" fill="#999" font-family="monospace" font-size="1.8" text-anchor="middle">RELEASE</text>

  <!-- ENV L — envelope CV output left -->
  <circle cx="5.08" cy="80" r="3.5" fill="none" stroke="#555" stroke-width="0.6"/>
  <circle cx="5.08" cy="80" r="1.4" fill="#333" stroke="#666" stroke-width="0.4"/>
  <text x="5.08" y="87" fill="#888" font-family="monospace" font-size="1.8" text-anchor="middle">ENV L</text>

  <!-- ENV R — envelope CV output right -->
  <circle cx="15.24" cy="80" r="3.5" fill="none" stroke="#555" stroke-width="0.6"/>
  <circle cx="15.24" cy="80" r="1.4" fill="#333" stroke="#666" stroke-width="0.4"/>
  <text x="15.24" y="87" fill="#888" font-family="monospace" font-size="1.8" text-anchor="middle">ENV R</text>

  <!-- ════════════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 8 — LP 1  (x:142.24–162.56, center x=152.40)                  -->
  <!-- Jack x: 147.32 (CUTOFF CV), 157.48 (RES CV)                           -->
  <!-- Common bottom: CV cy=118 label y=124.5 · ATT cy=109                    -->
  <!-- 3 knobs, 4 equal gaps ≈11.9mm: CUTOFF cy=31 · SPREAD cy=60            -->
  <!--   RESONANCE cy=86                                                        -->
  <!-- ════════════════════════════════════════════════════════════════════════ -->

  <!-- CUTOFF — large knob, 1V/oct -->
  <circle cx="152.40" cy="31" r="7" fill="#1a1a1a" stroke="#555" stroke-width="0.6"/>
  <line x1="152.40" y1="31" x2="152.40" y2="24" stroke="#aaa" stroke-width="0.7"/>
  <text x="152.40" y="41" fill="#999" font-family="monospace" font-size="1.8" text-anchor="middle">CUTOFF</text>

  <!-- SPREAD — medium knob, bipolar, center = no change (L/R cutoff skew) -->
  <circle cx="152.40" cy="60" r="4.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="152.40" y1="60" x2="152.40" y2="55.5" stroke="#aaa" stroke-width="0.6"/>
  <text x="152.40" y="67.5" fill="#999" font-family="monospace" font-size="1.8" text-anchor="middle">SPREAD</text>

  <!-- RESONANCE — medium knob -->
  <circle cx="152.40" cy="86" r="4.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="152.40" y1="86" x2="152.40" y2="81.5" stroke="#aaa" stroke-width="0.6"/>
  <text x="152.40" y="93.5" fill="#999" font-family="monospace" font-size="1.8" text-anchor="middle">RESONANCE</text>

  <!-- CUTOFF ATT — attenuverter -->
  <circle cx="147.32" cy="109" r="2.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="147.32" y1="109" x2="147.32" y2="106.5" stroke="#aaa" stroke-width="0.5"/>

  <!-- RES ATT — attenuverter -->
  <circle cx="157.48" cy="109" r="2.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="157.48" y1="109" x2="157.48" y2="106.5" stroke="#aaa" stroke-width="0.5"/>

  <!-- CUTOFF CV jack -->
  <circle cx="147.32" cy="118" r="3.5" fill="none" stroke="#555" stroke-width="0.6"/>
  <circle cx="147.32" cy="118" r="1.4" fill="#333" stroke="#666" stroke-width="0.4"/>
  <text x="147.32" y="124.5" fill="#777" font-family="monospace" font-size="1.8" text-anchor="middle">CUT</text>

  <!-- RES CV jack -->
  <circle cx="157.48" cy="118" r="3.5" fill="none" stroke="#555" stroke-width="0.6"/>
  <circle cx="157.48" cy="118" r="1.4" fill="#333" stroke="#666" stroke-width="0.4"/>
  <text x="157.48" y="124.5" fill="#777" font-family="monospace" font-size="1.8" text-anchor="middle">RES</text>

  <!-- ════════════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 9a — BAND OUT TOP STRIP  (x:162.56–182.88, y:4.5–28)          -->
  <!-- LP1 AUX L/R only (tap at LP1 output, pre-LP2) · cy=16 · label y=22.5  -->
  <!-- ════════════════════════════════════════════════════════════════════════ -->

  <!-- LP1 AUX L -->
  <circle cx="167.64" cy="16" r="3.5" fill="none" stroke="#555" stroke-width="0.6"/>
  <circle cx="167.64" cy="16" r="1.4" fill="#333" stroke="#666" stroke-width="0.4"/>
  <text x="167.64" y="22.5" fill="#888" font-family="monospace" font-size="1.8" text-anchor="middle">LP1 L</text>

  <!-- LP1 AUX R -->
  <circle cx="177.80" cy="16" r="3.5" fill="none" stroke="#555" stroke-width="0.6"/>
  <circle cx="177.80" cy="16" r="1.4" fill="#333" stroke="#666" stroke-width="0.4"/>
  <text x="177.80" y="22.5" fill="#888" font-family="monospace" font-size="1.8" text-anchor="middle">LP1 R</text>

  <!-- ════════════════════════════════════════════════════════════════════════ -->
  <!-- SECTION 9b — LP 2 FILTER  (x:162.56–182.88, y:28–128.85)              -->
  <!-- Center x=172.72 · Jack x: 167.64 (CUT), 177.80 (RES)                  -->
  <!-- Common bottom: CV cy=118 label y=124.5 · ATT cy=109                    -->
  <!-- CUTOFF: 45mm travel slider (ALPS RS4515N) track y=40–85, thumb y=62.5  -->
  <!-- RESONANCE cy=93 label y=101                                             -->
  <!-- ════════════════════════════════════════════════════════════════════════ -->

  <!-- CUTOFF — vertical slider: 45mm travel (ALPS RS4515N or equiv.)         -->
  <!-- Panel aperture: 4mm W × 45mm H  ·  Knob cap: 13mm W × 7mm H          -->
  <text x="172.72" y="38" fill="#999" font-family="monospace" font-size="1.8" text-anchor="middle">CUTOFF</text>
  <rect x="170.72" y="40" width="4" height="45" rx="1.5" fill="#111" stroke="#444" stroke-width="0.5"/>
  <rect x="166.22" y="59" width="13" height="7" rx="1.8" fill="#555" stroke="#777" stroke-width="0.4"/>

  <!-- RESONANCE — medium knob -->
  <circle cx="172.72" cy="93" r="4.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="172.72" y1="93" x2="172.72" y2="88.5" stroke="#aaa" stroke-width="0.6"/>
  <text x="172.72" y="101" fill="#999" font-family="monospace" font-size="1.8" text-anchor="middle">RESONANCE</text>

  <!-- CUTOFF ATT -->
  <circle cx="167.64" cy="109" r="2.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="167.64" y1="109" x2="167.64" y2="106.5" stroke="#aaa" stroke-width="0.5"/>

  <!-- RES ATT -->
  <circle cx="177.80" cy="109" r="2.5" fill="#1a1a1a" stroke="#555" stroke-width="0.5"/>
  <line x1="177.80" y1="109" x2="177.80" y2="106.5" stroke="#aaa" stroke-width="0.5"/>

  <!-- CUTOFF CV jack -->
