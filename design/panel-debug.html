<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>POGO Panel Debug</title>
  <style>
    body  { background:#111; color:#ccc; font-family:monospace; padding:16px; }
    h1    { color:#00d4ff; margin-bottom:8px; }
    .controls { margin-bottom:12px; display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
    .drc  { background:#1a0000; border:1px solid #553333; padding:8px 14px;
             margin-top:12px; border-radius:4px; max-width:812px; }
    .drc h2 { color:#ff8888; margin:0 0 6px; font-size:1em; }
    #svg-wrap { border:1px solid #333; display:inline-block; margin-top:8px; }
  </style>
</head>
<body>
  <h1>POGO Panel Debug</h1>
  <div class="controls">
    <label style="margin-right:16px;cursor:pointer;"><input type="checkbox" checked onchange="toggleLayer('layer-panel', this.checked)"> Panel (front)</label>
<label style="margin-right:16px;cursor:pointer;"><input type="checkbox"  onchange="toggleLayer('layer-keepout', this.checked)"> Rail Keep-Out</label>
<label style="margin-right:16px;cursor:pointer;"><input type="checkbox"  onchange="toggleLayer('layer-nuts', this.checked)"> Nuts / Knob Caps</label>
<label style="margin-right:16px;cursor:pointer;"><input type="checkbox"  onchange="toggleLayer('layer-pcb', this.checked)"> PCB Footprints (backside)</label>

  </div>
  <div id="svg-wrap">
    <!-- GENERATED by tools/build_panel.py — edit tools/panel-data.yaml -->
<svg xmlns="http://www.w3.org/2000/svg" width="1219px" height="514px" viewBox="0 0 304.80 128.5">
  <g id="layer-panel">


  <!-- ── PANEL BACKGROUND ─────────────────────────────────────────────────── -->
  <rect x="0" y="0" width="304.8" height="128.5" fill="#0d0d0d"/>
  <rect x="0" y="0" width="304.8" height="4.5" fill="#141414"/>
  <rect x="0" y="124.0" width="304.8" height="4.5" fill="#141414"/>

  <!--
    PANEL: 304.80 mm wide × 128.50 mm tall
    1 HP = 5.08 mm   jack pitch = 10.16 mm (2 HP)
    Jack x centres in an N-HP zone starting at x0:
      2 HP (1 j): x0+5.08
      4 HP (2 j): x0+5.08, x0+15.24
      6 HP (3 j): x0+5.08, x0+15.24, x0+25.40
      8 HP (4 j): x0+5.08, x0+15.24, x0+25.40, x0+35.56
  -->

  <!-- Mounting holes: M3 -->
  <circle cx="7.5" cy="5.1" r="1.6" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="297.3" cy="5.1" r="1.6" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="7.5" cy="123.4" r="1.6" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="297.3" cy="123.4" r="1.6" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="0.5"/>

  <!-- ── TOP STRIP ──────────────────────────────────────────────────────────── -->
  <text x="101.60" y="3.5" fill="#00d4ff" font-family="monospace" font-size="3.5" font-weight="bold" text-anchor="middle">POGO  <tspan fill="#ff8800">·</tspan> STEREO TRIPLE BANDPASS FILTER</text>

  <!-- ── BOTTOM STRIP ───────────────────────────────────────────────────────── -->
  <text x="101.60" y="127.5" fill="#4a6070" font-family="monospace" font-size="2.4" text-anchor="middle" letter-spacing="0.15">SPACE COAST SYNTHESIZERS  ·  SCS</text>

  <!-- ── MAIN ZONE SEPARATOR LINES (cyan) ──────────────────────────────────── -->

  <!-- ── ZONE 0 MINI-ZONE DIVIDERS (dim gray horizontal) ───────────────────── -->

  <!-- ── ZONE 1: BAND / DIST SUBSECTION DIVIDER (horizontal) ──────────────── -->

  <!-- ── LP2+HP+OUT ZONE: TOP STRIP / FILTER SECTION DIVIDER ──────────────── -->

  <!-- ════════════════════════════════════════════════════════════════════════ -->
  <!-- ZONE LABELS                                                              -->
  <!-- ════════════════════════════════════════════════════════════════════════ -->


  </g>

  <g id="layer-keepout" style="display:none;">
    <rect x="0" y="0" width="304.75" height="10.0" fill="rgba(255,0,0,0.18)"/>
    <rect x="0" y="118.5" width="304.75" height="10.0" fill="rgba(255,0,0,0.18)"/>
    <line x1="0" y1="10.0" x2="304.75" y2="10.0" stroke="#ff4444" stroke-width="0.35" stroke-dasharray="1 0.7"/>
    <line x1="0" y1="118.5" x2="304.75" y2="118.5" stroke="#ff4444" stroke-width="0.35" stroke-dasharray="1 0.7"/>
    <text x="1" y="9.6" fill="#ff4444" font-family="monospace" font-size="1.8">TOP KEEP-OUT</text>
    <text x="1" y="118.0" fill="#ff4444" font-family="monospace" font-size="1.8">BOT KEEP-OUT</text>
  </g>

  <g id="layer-nuts" style="display:none;">

  </g>

  <g id="layer-pcb" style="display:none;">

  </g>
</svg>
  </div>
  <div class="drc">
    <h2>DRC: PASS</h2>
    <p style='color:#44ff44'>No DRC violations.</p>
  </div>
  <script>
    function toggleLayer(id, visible) {
      var el = document.getElementById(id);
      if (el) el.style.display = visible ? '' : 'none';
    }
  </script>
</body>
</html>
