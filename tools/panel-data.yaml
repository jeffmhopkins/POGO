# POGO panel data — edit this file to change the panel layout.
# Generated SVG and C++ stubs are produced by tools/build_panel.py.
#
# Workflow: add one zone at a time, run `python3 tools/build_panel.py --check`
# after each addition. Confirm clean before moving to the next zone.

# ── Meta ─────────────────────────────────────────────────────────────────────
meta:
  hp:         60
  width_mm:   304.80        # 60 HP × 5.08 mm/HP
  height_mm:  128.5
  viewBox:    "0 0 304.80 128.5"
  title:      "POGO  · STEREO TRIPLE BANDPASS FILTER"
  title_dot_color: "#ff8800"
  brand:      "SPACE COAST SYNTHESIZERS  ·  SCS"

# ── Colors ───────────────────────────────────────────────────────────────────
colors:
  panel_bg:       "#0d0d0d"
  panel_strip:    "#141414"
  cyan:           "#00d4ff"
  brand_text:     "#4a6070"
  control_text:   "#999"
  jack_text:      "#888"
  jack_outer:     "#555"
  jack_inner:     "#333"
  jack_inner_s:   "#666"
  knob_fill:      "#1a1a1a"
  knob_stroke:    "#555"
  indicator:      "#aaa"
  switch_body:    "#222"
  switch_slug:    "#666"
  switch_slug_s:  "#888"
  switch_label:   "#3d5260"
  subdiv:         "#2a2a2a"
  zone_div:       "#3a3a3a"
  output_rect_s:  "#888"
  led_fill:       "#441111"
  led_stroke:     "#cc2222"

# ── Design rules ─────────────────────────────────────────────────────────────
design_rules:
  top_keepout:       10.0
  bot_keepout_start: 118.5
  cv_jack_cy:        112.0   # PCB courtyard bottom = 118.50 mm — at rail keepout floor
  att_offset:        -15.0   # att_cy = cv_jack_cy + att_offset = 97.0
  jack_label_dy:      7.0    # label_y = cy + 7.0
  output_rect_dy:    -1.76
  output_rect_h:      2.26
  output_rect_rx:     0.6
  jack_pitch:        15.24   # 1 jack per 3 HP
  indicator_length:   2.5

# ── Hardware footprints (for DRC overlay) ────────────────────────────────────
footprints:
  jack_thonkiconn:
    body_r_mm: 4.0
    nut_r_mm:  5.0      # Thonkiconn hex nut radius
  pot_alpha9mm:
    body_r_mm: 4.5
    nut_r_mm:  5.5      # Alpha 9mm bushing nut radius
  led_3mm:
    body_r_mm: 1.5

# ── Mounting holes ────────────────────────────────────────────────────────────
# 60 HP: left holes at x=7.5, right holes at x=304.80-7.5=297.30
mounting_holes:
  - {cx:   7.50, cy:   5.1}
  - {cx: 297.30, cy:   5.1}
  - {cx:   7.50, cy: 123.4}
  - {cx: 297.30, cy: 123.4}

# ── Separator lines ───────────────────────────────────────────────────────────
# Jack grid: uniform 2.25 HP (11.43 mm) pitch across all bottom-row jacks.
# Cyan dividers land at the midpoint between adjacent jacks across zone boundaries:
#   midpoint(col_last, col_first_next) = x_start_next  (since pitch is uniform)
# Section 0: 3 cols at 2.25 HP → right edge = 3 × 11.43 = 34.29 mm
#   col 0 cx = 5.715mm, col 1 cx = 17.145mm, col 2 cx = 28.575mm
# LP1: x_start = 34.29mm, 3 cols → right edge = 34.29 + 34.29 = 68.58 mm
#   col 0 cx = 40.005mm, col 1 cx = 51.435mm, col 2 cx = 62.865mm
separators:
  # ── Section 0 / LP1 boundary ──────────────────────────────────────────────────
  # x = midpoint(VCA_IN=28.575, LP1_FREQ=40.005) = 34.29mm
  - {type: v, x: 34.29, y1: 9.0, y2: 124.0, style: main_cyan}
  # Top of INPUT zone — label breaks the line
  # Perfect midpoint: strip bottom = 4.5mm, L_IN visual top = 13.5mm → mid = 9.0
  - {type: h, x1: 1.0, x2: 33.79, y: 9.0, style: zone_div, label: "INPUT", label_x: 17.145}
  # INPUT / GAIN → LFO boundary — label breaks the line
  - {type: h, x1: 1.0, x2: 33.79, y: 43.0, style: zone_div, label: "LFOs", label_x: 17.145}
  # LFO → MOD BUS boundary — label breaks the line
  # Perfect midpoint: LFO2 Rate 2 label baseline = 73.4mm, SCALE top = 80.5mm → mid = 76.95
  - {type: h, x1: 1.0, x2: 33.79, y: 77.0, style: zone_div, label: "MOD BUS", label_x: 17.145}

  # ── LP1 right boundary / LP2 boundary ────────────────────────────────────────
  # x = midpoint(LP1_RES=62.865, next-zone col0=74.295) = 68.58mm
  - {type: v, x: 68.58, y1: 9.0, y2: 124.0, style: main_cyan}
  - {type: h, x1: 35.29, x2: 68.08, y: 9.0, style: zone_div, label: "LP1", label_x: 51.435}

  # ── BP CONTROL right boundary ─────────────────────────────────────────────────
  # 2-col section (2 × 11.43mm = 22.86mm); jacks continue 2.25HP grid
  # x = midpoint(BP_TILT_IN=85.725, next col0=97.155) = 91.44mm
  - {type: v, x: 91.44, y1: 9.0, y2: 124.0, style: main_cyan}
  - {type: h, x1: 69.58, x2: 90.94, y: 9.0, style: zone_div, label: "BP", label_x: 80.01}

# ── Zone labels ───────────────────────────────────────────────────────────────
# x=17.145 is the geometric centre of the 3-column section (col 1 cx)
zone_labels: []

# ── Zones ─────────────────────────────────────────────────────────────────────
zones:

  # ── Section 0a: INPUT / GAIN ──────────────────────────────────────────────
  # col 0 → cx = 5.715mm, col 1 → cx = 17.145mm, col 2 → cx = 28.575mm (switches)
  - id: zone_input
    label: "Zone 0a — INPUT / GAIN"
    x_start: 0
    col_pitch: 11.43
    cols: 3
    components:
      - id: L_IN
        type: jack_input
        col: 0
        cy: 17
        rotate: 180
        label: "L IN"
        font_size: 1.8
        cpp_id: "L_IN_INPUT"
      - id: R_IN
        type: jack_input
        col: 1
        cy: 17
        rotate: 180
        label: "R IN"
        font_size: 1.8
        cpp_id: "R_IN_INPUT"
      - id: GAIN_MAIN
        type: switch_H2
        cx: 28.575
        cy: 17
        label_above: "MAIN"
        pos_labels: ["1×", "5×"]
        pos_xs: [24.075, 33.075]
        cpp_param: "GAIN_PARAM"
      - id: BP3_L
        type: jack_input
        col: 0
        cy: 31.5
        rotate: 180
        label: "BP3 L"
        font_size: 1.6
        cpp_id: "ALT_BP_L_INPUT"
      - id: BP3_R
        type: jack_input
        col: 1
        cy: 31.5
        rotate: 180
        label: "BP3 R"
        font_size: 1.6
        cpp_id: "ALT_BP_R_INPUT"
      - id: GAIN_BP3
        type: switch_H2
        cx: 28.575
        cy: 31.5
        label_above: "BP3"
        pos_labels: ["1×", "5×"]
        pos_xs: [24.075, 33.075]
        cpp_param: "ALT_GAIN_PARAM"

  # ── Section 0b: LFO ───────────────────────────────────────────────────────
  # col 0 jack | col 1 LED | col 2 knob
  - id: zone_lfo
    label: "Zone 0b — LFO"
    x_start: 0
    col_pitch: 11.43
    cols: 3
    components:
      - id: LFO1_OUT
        type: jack_output
        col: 0
        cy: 51.5
        label: "LFO 1"
        font_size: 1.6
        cpp_id: "LFO1_OUTPUT"
      - id: LFO1_LED
        type: led
        col: 1
        cy: 51.5
        led_fill:   "#112244"
        led_stroke: "#2255cc"
        cpp_id: "LFO1_LED"
      - id: LFO1_RATE
        type: knob_medium
        col: 2
        cy: 51.5
        label: "Rate 1"
        cpp_param: "LFO1_RATE_PARAM"
      - id: LFO2_OUT
        type: jack_output
        col: 0
        cy: 65.9
        label: "LFO 2"
        font_size: 1.6
        cpp_id: "LFO2_OUTPUT"
      - id: LFO2_LED
        type: led
        col: 1
        cy: 65.9
        led_fill:   "#112244"
        led_stroke: "#2255cc"
        cpp_id: "LFO2_LED"
      - id: LFO2_RATE
        type: knob_medium
        col: 2
        cy: 65.9
        label: "Rate 2"
        cpp_param: "LFO2_RATE_PARAM"

  # ── Section 0c: MOD BUS ───────────────────────────────────────────────────
  # Row 1 knobs: SCALE col 0 (rotate=180 keeps CrtYd in panel), VCA AMT col 2
  #   col 0 and col 2 have 5.56mm x-gap → same cy OK; cy=83
  # Row 2 knobs: OFFSET col 0 (rotate=180), VCA OFS col 2; cy=96.34 (min pot→pot 13.34mm)
  # Row 3 jacks: MOD IN col 0, LED col 1 (blue), VCA IN col 2; cy=112 (cv_jack_cy)
  #   Pot→jack gap: 96.34+6.67=103.01 vs 112-7.9=104.1 → 1.09mm clearance ✓
  - id: zone_mod
    label: "Zone 0c — MOD BUS"
    x_start: 0
    col_pitch: 11.43
    cols: 3
    components:
      - id: SCALE
        type: trimpot
        col: 0
        cy: 83.0
        rotate: 180
        label: "SCALE"
        cpp_param: "MOD_SCALE_PARAM"
      - id: VCA_AMT
        type: trimpot
        col: 2
        cy: 83.0
        label: "VCA AMT"
        cpp_param: "VCA_AMT_PARAM"
      - id: MOD_LED_R1
        type: led_labeled
        col: 1
        cy: 83.0
        label: "CLIP"
        label_dy: 5.5
        led_fill:   "#441111"
        led_stroke: "#cc2222"
        cpp_id: "MOD_LED_R1"
      - id: OFFSET
        type: trimpot
        col: 0
        cy: 96.34
        rotate: 180
        label: "OFFSET"
        cpp_param: "MOD_OFFSET_PARAM"
      - id: VCA_OFS
        type: trimpot
        col: 2
        cy: 96.34
        label: "VCA OFS"
        cpp_param: "VCA_OFS_PARAM"
      - id: MOD_LED_R2
        type: led_labeled
        col: 1
        cy: 96.34
        label: "POS"
        label_dy: 5.5
        led_fill:   "#112244"
        led_stroke: "#2255cc"
        cpp_id: "MOD_LED_R2"
      - id: MOD_IN
        type: jack_input
        col: 0
        cy: 112.0
        label: "MOD IN"
        font_size: 1.6
        cpp_id: "MOD_INPUT"
      - id: MOD_LED_R3
        type: led_labeled
        col: 1
        cy: 112.0
        label: "NEG"
        led_fill:   "#441111"
        led_stroke: "#cc2222"
        cpp_id: "MOD_LED_R3"
      - id: VCA_IN
        type: jack_input
        col: 2
        cy: 112.0
        label: "VCA IN"
        font_size: 1.6
        cpp_id: "VCA_INPUT"

  # ── LP1: Low-Pass Filter 1 ────────────────────────────────────────────────────
  # 9 HP   x_start=35.56   col_pitch=15.24 (3 HP/col)
  # col 0 cx=43.18  col 1 cx=58.42  col 2 cx=73.66
  # All main knobs centred at col 1 (cx=58.42mm).
  # Attenuverters spread across cols 0/1/2 at cy=97.0 (ATT-to-jack gap 0.43mm ✓).
  # Adjacent ATT pots: 1.49mm x-gap (no PCB overlap). Bottom jacks cy=112.0 (matching sec 0).
  - id: zone_lp1
    label: "Zone — LP1 Low-Pass Filter"
    x_start: 34.29             # = 3 × 11.43mm; aligns LP1 col0 jack at 40.005mm = 28.575 + 11.43
    col_pitch: 11.43           # 2.25 HP/col — uniform grid with section-0
    cols: 3
    components:
      # ── Main knobs (all col 1 = section centre cx=51.435mm) ──────────────────
      # Evenly spaced between top label (y=9.0) and trimpot courtyard top (y=96.615):
      #   gap = (87.615 − 60.4) / 4 = 6.80mm at top, between each, and below last label
      - id: LP1_FREQ
        type: knob_xl
        col: 1
        cy: 24.8
        label: "FREQ"
        cpp_param: "LP1_FREQ_PARAM"
      - id: LP1_TILT
        type: knob_large
        col: 1
        cy: 52.4
        label: "TILT"
        cpp_param: "LP1_TILT_PARAM"
      - id: LP1_RES
        type: knob_large
        col: 1
        cy: 78.0
        label: "RES"
        cpp_param: "LP1_RES_PARAM"
      # ── Attenuverters — compact pot (Bourns PTV09A style), no label ──────────
      # ATT_CY = ±5mm symmetric; fits 11.43mm pitch with 1.43mm x-gap each side
      - id: LP1_FREQ_ATT
        type: trimpot
        col: 0
        cy: 100.0
        cpp_param: "LP1_FREQ_ATT_PARAM"
      - id: LP1_TILT_ATT
        type: trimpot
        col: 1
        cy: 100.0
        cpp_param: "LP1_TILT_ATT_PARAM"
      - id: LP1_RES_ATT
        type: trimpot
        col: 2
        cy: 100.0
        cpp_param: "LP1_RES_ATT_PARAM"
      # ── CV input jacks (cy=112.0 matches section-0 bottom row) ───────────────
      - id: LP1_FREQ_IN
        type: jack_input
        col: 0
        cy: 112.0
        label: "FREQ"
        cpp_id: "LP1_FREQ_INPUT"
      - id: LP1_TILT_IN
        type: jack_input
        col: 1
        cy: 112.0
        label: "TILT"
        cpp_id: "LP1_TILT_INPUT"
      - id: LP1_RES_IN
        type: jack_input
        col: 2
        cy: 112.0
        label: "RES"
        cpp_id: "LP1_RES_INPUT"

  # ── BP CONTROL: Bandpass Filter Controls ──────────────────────────────────────
  # 2 cols × 11.43mm = 22.86mm (4.5HP).  cx_c0=74.295  cx_c1=85.725  cx_ctr=80.01
  # All 5 vertical gaps equal 6.20mm: top-label → xl → med-pair → H2 → H3 → ATT-top
  - id: zone_bp
    label: "Zone — BP CONTROL"
    x_start: 68.58
    col_pitch: 11.43
    cols: 2
    components:
      # ── Master Offset xl knob — centred on section; cy matches LP1_FREQ ────────
      - id: BP_OFFSET
        type: knob_xl
        cx: 80.01
        cy: 24.80
        label: "OFFSET"
        cpp_param: "BP_OFFSET_PARAM"
      # ── BP Mix medium knob — centred; cy matches LP1_TILT ────────────────────
      - id: BP_MIX
        type: knob_medium
        cx: 80.01
        cy: 52.40
        label: "MIX"
        cpp_param: "BP_MIX_PARAM"
      # ── Polarity switch (H2) — centred on section, no section label ─────────
      - id: BP_POL
        type: switch_H2
        cx: 80.01
        cy: 70.0
        label_above: ""
        pos_labels: ["POS", "NEG"]
        pos_xs: [75.51, 84.51]
        cpp_param: "BP_POL_PARAM"
      # ── Distortion switch (H3) — centred on section, no section label ────────
      # Must be ≥11.0mm below H2 (same cx, full x-overlap)
      # H2 bottom = 77.5mm, H3 top = 78.5mm → gap = 1.0mm ✓
      # pos_xs use col centres (74.30/80.01/85.72) for readable spread
      - id: BP_DIST
        type: switch_H3
        cx: 80.01
        cy: 82.0
        pos_labels: ["SOFT", "HARD", "FOLD"]
        pos_xs: [74.30, 80.01, 85.72]
        label_below: ""
        cpp_param: "BP_DIST_PARAM"
      # ── CV attenuverter trim pots ────────────────────────────────────────────
      - id: BP_FREQ_ATT
        type: trimpot
        col: 0
        cy: 100.0
        cpp_param: "BP_FREQ_ATT_PARAM"
      - id: BP_TILT_ATT
        type: trimpot
        col: 1
        cy: 100.0
        cpp_param: "BP_TILT_ATT_PARAM"
      # ── CV input jacks (2.25HP grid continues: 74.295mm, 85.725mm) ───────────
      - id: BP_FREQ_IN
        type: jack_input
        col: 0
        cy: 112.0
        label: "FREQ"
        cpp_id: "BP_FREQ_INPUT"
      - id: BP_TILT_IN
        type: jack_input
        col: 1
        cy: 112.0
        label: "TILT"
        cpp_id: "BP_TILT_INPUT"
