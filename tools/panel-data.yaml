        type: jack_input
        cx: 5.08
        cy: 16
        label: "L IN"
        font_size: 1.8
        cpp_id: "L_IN_INPUT"
      - id: R_IN
        type: jack_input
        cx: 15.24
        cy: 16
        label: "R IN"
        font_size: 1.8
        cpp_id: "R_IN_INPUT"
      - id: GAIN
        type: switch_H2
        cx: 10.16
        cy: 32
        label_above: "GAIN"
        label_above_y: 28.5
        pos_labels: ["1×", "5×"]
        pos_xs: [7.91, 12.41]
        pos_y: 36.0
        cpp_param: "GAIN_PARAM"
      - id: BP3_L
        type: jack_input
        cx: 5.08
        cy: 43
        label: "BP3 L"
        font_size: 1.6
        cpp_id: "ALT_BP_L_INPUT"
      - id: BP3_R
