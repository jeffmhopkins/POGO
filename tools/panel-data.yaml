# POGO panel data — edit this file to change the panel layout.
# Generated SVG and C++ stubs are produced by tools/build_panel.py.
#
# Workflow: add one zone at a time, run `python3 tools/build_panel.py --check`
# after each addition. Confirm clean before moving to the next zone.

# ── Meta ─────────────────────────────────────────────────────────────────────
meta:
  hp:         60
  width_mm:   304.80        # 60 HP × 5.08 mm/HP
  height_mm:  128.5
  viewBox:    "0 0 304.80 128.5"
  title:      "POGO  · STEREO TRIPLE BANDPASS FILTER"
  title_dot_color: "#ff8800"
  brand:      "SPACE COAST SYNTHESIZERS  ·  SCS"

# ── Colors ───────────────────────────────────────────────────────────────────
colors:
  panel_bg:       "#0d0d0d"
  panel_strip:    "#141414"
  cyan:           "#00d4ff"
  brand_text:     "#4a6070"
  control_text:   "#999"
  jack_text:      "#888"
  jack_outer:     "#555"
  jack_inner:     "#333"
  jack_inner_s:   "#666"
  knob_fill:      "#1a1a1a"
  knob_stroke:    "#555"
  indicator:      "#aaa"
  switch_body:    "#222"
  switch_slug:    "#666"
  switch_slug_s:  "#888"
  switch_label:   "#3d5260"
  subdiv:         "#2a2a2a"
  zone_div:       "#2d2d2d"
  output_rect_s:  "#888"
  led_fill:       "#441111"
  led_stroke:     "#cc2222"

# ── Design rules ─────────────────────────────────────────────────────────────
design_rules:
  top_keepout:       10.0
  bot_keepout_start: 118.5
  cv_jack_cy:        112.5   # nut bottom = 117.5 mm → 1 mm clear of keepout
  att_offset:       -10.75   # att_cy = cv_jack_cy + att_offset = 101.75
  jack_label_dy:      7.0    # label_y = cy + 7.0
  output_rect_dy:    -1.76
  output_rect_h:      2.26
  output_rect_rx:     0.6
  jack_pitch:        10.16   # 1 jack per 2 HP
  indicator_length:   2.5

# ── Hardware footprints (for DRC overlay) ────────────────────────────────────
footprints:
  jack_thonkiconn:
    body_r_mm: 4.0
    nut_r_mm:  5.0      # Thonkiconn hex nut radius
  pot_alpha9mm:
    body_r_mm: 4.5
    nut_r_mm:  5.5      # Alpha 9mm bushing nut radius
  led_3mm:
    body_r_mm: 1.5

# ── Mounting holes ────────────────────────────────────────────────────────────
# 60 HP: left holes at x=7.5, right holes at x=304.80-7.5=297.30
mounting_holes:
  - {cx:   7.50, cy:   5.1}
  - {cx: 297.30, cy:   5.1}
  - {cx:   7.50, cy: 123.4}
  - {cx: 297.30, cy: 123.4}

# ── Separator lines ───────────────────────────────────────────────────────────
separators: []

# ── Zone labels ───────────────────────────────────────────────────────────────
zone_labels: []

# ── Zones ─────────────────────────────────────────────────────────────────────
# Add one zone at a time. Run `python3 tools/build_panel.py --check` after each.
zones: []
