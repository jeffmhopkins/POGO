# POGO panel data — edit this file to change the panel layout.
# Generated SVG and C++ stubs are produced by tools/build_panel.py.
#
# Workflow: add one zone at a time, run `python3 tools/build_panel.py --check`
# after each addition. Confirm clean before moving to the next zone.

# ── Meta ─────────────────────────────────────────────────────────────────────
meta:
  hp:         60
  width_mm:   304.80        # 60 HP × 5.08 mm/HP
  height_mm:  128.5
  viewBox:    "0 0 304.80 128.5"
  title:      "POGO  · STEREO TRIPLE BANDPASS FILTER"
  title_dot_color: "#ff8800"
  brand:      "SPACE COAST SYNTHESIZERS  ·  SCS"

# ── Colors ───────────────────────────────────────────────────────────────────
colors:
  panel_bg:       "#0d0d0d"
  panel_strip:    "#141414"
  cyan:           "#00d4ff"
  brand_text:     "#4a6070"
  control_text:   "#999"
  jack_text:      "#888"
  jack_outer:     "#555"
  jack_inner:     "#333"
  jack_inner_s:   "#666"
  knob_fill:      "#1a1a1a"
  knob_stroke:    "#555"
  indicator:      "#aaa"
  switch_body:    "#222"
  switch_slug:    "#666"
  switch_slug_s:  "#888"
  switch_label:   "#3d5260"
  subdiv:         "#2a2a2a"
  zone_div:       "#2d2d2d"
  output_rect_s:  "#888"
  led_fill:       "#441111"
  led_stroke:     "#cc2222"

# ── Design rules ─────────────────────────────────────────────────────────────
design_rules:
  top_keepout:       10.0
  bot_keepout_start: 118.5
  cv_jack_cy:        112.0   # PCB courtyard bottom = 118.50 mm — at rail keepout floor
  att_offset:        -15.0   # att_cy = cv_jack_cy + att_offset = 97.0
  jack_label_dy:      7.0    # label_y = cy + 7.0
  output_rect_dy:    -1.76
  output_rect_h:      2.26
  output_rect_rx:     0.6
  jack_pitch:        15.24   # 1 jack per 3 HP
  indicator_length:   2.5

# ── Hardware footprints (for DRC overlay) ────────────────────────────────────
footprints:
  jack_thonkiconn:
    body_r_mm: 4.0
    nut_r_mm:  5.0      # Thonkiconn hex nut radius
  pot_alpha9mm:
    body_r_mm: 4.5
    nut_r_mm:  5.5      # Alpha 9mm bushing nut radius
  led_3mm:
    body_r_mm: 1.5

# ── Mounting holes ────────────────────────────────────────────────────────────
# 60 HP: left holes at x=7.5, right holes at x=304.80-7.5=297.30
mounting_holes:
  - {cx:   7.50, cy:   5.1}
  - {cx: 297.30, cy:   5.1}
  - {cx:   7.50, cy: 123.4}
  - {cx: 297.30, cy: 123.4}

# ── Separator lines ───────────────────────────────────────────────────────────
# Section 0 occupies HP 3–9 (x = 15.24–45.72 mm)
# Columns at cx=20.32 (HP 4) and cx=35.56 (HP 7) — 3 HP pitch
separators:
  # Section 0 right boundary — cyan vertical
  - {type: v, x: 45.72, y1: 4.5, y2: 124.0, style: main_cyan}
  # Sub-section dividers within Section 0
  - {type: h, x1: 15.24, x2: 45.22, y: 52.0, style: zone_div}
  - {type: h, x1: 15.24, x2: 45.22, y: 86.0, style: zone_div}

# ── Zone labels ───────────────────────────────────────────────────────────────
zone_labels:
  - {x: 30.48, y: 12.0, text: "INPUT / GAIN"}
  - {x: 30.48, y: 55.0, text: "LFO"}
  - {x: 30.48, y: 88.0, text: "MOD BUS"}

# ── Zones ─────────────────────────────────────────────────────────────────────
zones:

  # ── Section 0a: INPUT / GAIN ──────────────────────────────────────────────
  # 2 input jacks + pre-gain switch + 2 alt bandpass inputs
  # x_start = 15.24 (HP3), col_pitch = 11.43 (2.25HP), cols = 2
  # col 0 → cx = 20.955mm, col 1 → cx = 32.385mm
  - id: zone_input
    label: "Zone 0a — INPUT / GAIN"
    x_start: 15.24
    col_pitch: 11.43
    cols: 2
    components:
      - id: L_IN
        type: jack_input
        col: 0
        cy: 18
        label: "L IN"
        font_size: 1.8
        cpp_id: "L_IN_INPUT"
      - id: R_IN
        type: jack_input
        col: 1
        cy: 18
        label: "R IN"
        font_size: 1.8
        cpp_id: "R_IN_INPUT"
      - id: GAIN
        type: switch_H2
        cx: 26.67
        cy: 28
        label_above: "GAIN"
        label_above_y: 22.0
        pos_labels: ["1×", "5×"]
        pos_xs: [22.17, 31.17]
        pos_y: 33.0
        cpp_param: "GAIN_PARAM"
      - id: BP3_L
        type: jack_input
        col: 0
        cy: 44
        label: "BP3 L"
        font_size: 1.6
        cpp_id: "ALT_BP_L_INPUT"
      - id: BP3_R
        type: jack_input
        col: 1
        cy: 44
        label: "BP3 R"
        font_size: 1.6
        cpp_id: "ALT_BP_R_INPUT"

  # ── Section 0b: LFO ───────────────────────────────────────────────────────
  # Two independent LFOs: speed trimpot → LED → output jack, each in its own column
  # col_pitch = 11.43 (2.25HP) — matches zone_input column centrelines
  # col 0 → cx = 20.955mm (LFO 1), col 1 → cx = 32.385mm (LFO 2)
  # LFO2 trimpot rotated 180° so Alpha pot pins face outward — prevents CrtYd x-overlap
  - id: zone_lfo
    label: "Zone 0b — LFO"
    x_start: 15.24
    col_pitch: 11.43
    cols: 2
    components:
      - id: LFO1_SPEED
        type: trimpot
        col: 0
        cy: 60
        label: "SPEED"
        label_font_size: 1.8
        cpp_param: "LFO1_SPEED_PARAM"
      - id: LFO2_SPEED
        type: trimpot
        col: 1
        cy: 60
        rotate: 180
        label: "SPEED"
        label_font_size: 1.8
        cpp_param: "LFO2_SPEED_PARAM"
      - id: LFO1_LED
        type: led
        col: 0
        cy: 69
        cpp_light: "LFO1_LIGHT"
      - id: LFO2_LED
        type: led
        col: 1
        cy: 69
        cpp_light: "LFO2_LIGHT"
      - id: LFO1_OUT
        type: jack_output
        col: 0
        cy: 82
        label: "LFO 1"
        font_size: 1.8
        cpp_id: "LFO1_OUTPUT"
      - id: LFO2_OUT
        type: jack_output
        col: 1
        cy: 82
        label: "LFO 2"
        font_size: 1.8
        cpp_id: "LFO2_OUTPUT"

  # ── Section 0c: MOD BUS ───────────────────────────────────────────────────
  # Mod bus processor: amount + offset trimpots, mod input jack, activity LED
  # col_pitch = 11.43 (2.25HP) — matches zone_input/zone_lfo column centrelines
  # col 0 → cx = 20.955mm, col 1 → cx = 32.385mm
  # MOD_OFFSET rotated 180° (same reason as LFO2_SPEED — prevents CrtYd x-overlap)
  - id: zone_modbus
    label: "Zone 0c — MOD BUS"
    x_start: 15.24
    col_pitch: 11.43
    cols: 2
    components:
      - id: MOD_AMOUNT
        type: trimpot
        col: 0
        cy: _att_cy_
        label: "AMOUNT"
        label_font_size: 1.8
        cpp_param: "MOD_AMOUNT_PARAM"
      - id: MOD_OFFSET
        type: trimpot
        col: 1
        cy: _att_cy_
        rotate: 180
        label: "OFFSET"
        label_font_size: 1.8
        cpp_param: "MOD_OFFSET_PARAM"
      - id: MOD_IN
        type: jack_input
        col: 0
        cy: _cv_jack_cy_
        label: "MOD IN"
        font_size: 1.8
        cpp_id: "MOD_IN_INPUT"
      - id: MOD_LED
        type: led_labeled
        col: 1
        cy: _cv_jack_cy_
        label: "MOD"
        label_y_offset: 7.0
        label_fill: "#888"
        cpp_light: "MOD_LIGHT"
