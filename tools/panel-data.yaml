# POGO panel data — edit this file to change the panel layout.
# Generated SVG and C++ stubs are produced by tools/build_panel.py.
#
# Workflow: add one zone at a time, run `python3 tools/build_panel.py --check`
# after each addition. Confirm clean before moving to the next zone.

# ── Meta ─────────────────────────────────────────────────────────────────────
meta:
  hp:         48
  width_mm:   243.84        # 48 HP × 5.08 mm/HP
  height_mm:  128.5
  viewBox:    "0 0 243.84 128.5"
  title:      "POGO - Stereo Filter Bank"
  title_dot_color: "#ff8800"
  brand:      "SPACE COAST SYNTHESIZERS  ·  SCS"

# ── Colors ───────────────────────────────────────────────────────────────────
colors:
  panel_bg:       "#0d0d0d"
  panel_strip:    "#141414"
  cyan:           "#00d4ff"
  brand_text:     "#4a6070"
  control_text:   "#999"
  jack_text:      "#888"
  jack_outer:     "#555"
  jack_inner:     "#333"
  jack_inner_s:   "#666"
  knob_fill:      "#1a1a1a"
  knob_stroke:    "#555"
  indicator:      "#aaa"
  switch_body:    "#222"
  switch_slug:    "#666"
  switch_slug_s:  "#888"
  switch_label:   "#3d5260"
  subdiv:         "#2a2a2a"
  zone_div:       "#3a3a3a"
  output_rect_s:  "#888"
  led_fill:       "#441111"
  led_stroke:     "#cc2222"

# ── Design rules ─────────────────────────────────────────────────────────────
design_rules:
  top_keepout:       10.0
  bot_keepout_start: 118.5
  cv_jack_cy:        112.0   # PCB courtyard bottom = 118.50 mm — at rail keepout floor
  att_offset:        -15.0   # att_cy = cv_jack_cy + att_offset = 97.0
  jack_label_dy:      7.0    # label_y = cy + 7.0
  output_rect_dy:    -1.76
  output_rect_h:      2.26
  output_rect_rx:     0.6
  jack_pitch:        15.24   # 1 jack per 3 HP
  indicator_length:   2.5
  x_offset:           1.905  # shifts all zone/separator x coords right to centre in 48HP

# ── Hardware footprints (for DRC overlay) ────────────────────────────────────
footprints:
  jack_thonkiconn:
    body_r_mm: 4.0
    nut_r_mm:  5.0      # Thonkiconn hex nut radius
  pot_alpha9mm:
    body_r_mm: 4.5
    nut_r_mm:  5.5      # Alpha 9mm bushing nut radius
  led_3mm:
    body_r_mm: 1.5

# ── Knob cap sizing ──────────────────────────────────────────────────────────
knobs:
  default_cap_mm: 14.0

# ── Mounting holes ────────────────────────────────────────────────────────────
mounting_holes:
  - {cx:   7.50, cy:   5.1}
  - {cx: 236.34, cy:   5.1}
  - {cx:   7.50, cy: 123.4}
  - {cx: 236.34, cy: 123.4}

# ── Separator lines ───────────────────────────────────────────────────────────
separators:
  # ── Section 0 / LP1 boundary ──────────────────────────────────────────────────
  - {type: v, x: 34.29, y1: 9.0, y2: 124.0, style: zone_div}
  - {type: h, x1: 1.0, x2: 34.29, y: 9.0, style: zone_div, label: "INPUT", label_x: 17.145}
  - {type: h, x1: 1.0, x2: 34.29, y: 43.0, style: zone_div, label: "LFOs", label_x: 17.145}
  - {type: h, x1: 1.0, x2: 34.29, y: 77.0, style: zone_div, label: "MOD BUS", label_x: 17.145}

  # ── LP1 right boundary / LP2 boundary ────────────────────────────────────────
  - {type: v, x: 68.58, y1: 9.0, y2: 124.0, style: zone_div}
  - {type: h, x1: 34.29, x2: 68.58, y: 9.0, style: zone_div, label: "LP1", label_x: 51.435}

  # ── BP CONTROL right boundary ─────────────────────────────────────────────────
  - {type: v, x: 91.44, y1: 9.0, y2: 124.0, style: zone_div}
  - {type: h, x1: 68.58, x2: 91.44, y: 9.0, style: zone_div, label: "BP", label_x: 80.01}

  # ── BP 1 right boundary ────────────────────────────────────────────────────────
  - {type: v, x: 125.73, y1: 9.0, y2: 124.0, style: zone_div}
  - {type: h, x1: 91.44, x2: 125.73, y: 9.0, style: zone_div, label: "BP 1", label_x: 108.585}

  # ── BP 2 right boundary ────────────────────────────────────────────────────────
  - {type: v, x: 160.02, y1: 9.0, y2: 124.0, style: zone_div}
  - {type: h, x1: 125.73, x2: 160.02, y: 9.0, style: zone_div, label: "BP 2", label_x: 142.875}

  # ── BP 3 right boundary ────────────────────────────────────────────────────────
  - {type: v, x: 194.31, y1: 9.0, y2: 124.0, style: zone_div}
  - {type: h, x1: 160.02, x2: 194.31, y: 9.0, style: zone_div, label: "BP 3", label_x: 177.165}

  # ── BP3 OUT + HP right boundary ───────────────────────────────────────────────
  - {type: v, x: 217.17, y1: 9.0, y2: 124.0, style: zone_div}
  - {type: h, x1: 194.31, x2: 217.17, y: 9.0, style: zone_div, label: "BP3 Out", label_x: 205.74}
  - {type: h, x1: 194.31, x2: 217.17, y: 26.0, style: zone_div, label: "HP", label_x: 205.74}

  # ── MAIN OUT + LP2 right boundary ─────────────────────────────────────────────
  - {type: h, x1: 217.17, x2: 240.03, y: 9.0, style: zone_div, label: "Main Out", label_x: 228.60}
  - {type: h, x1: 217.17, x2: 240.03, y: 26.0, style: zone_div, label: "LP2", label_x: 228.60}

# ── Zone labels ───────────────────────────────────────────────────────────────
zone_labels: []

# ── Zones ─────────────────────────────────────────────────────────────────────
zones:

  # ── Section 0a: INPUT / GAIN ──────────────────────────────────────────────
  - id: zone_input
    label: "Zone 0a — INPUT / GAIN"
    x_start: 0
    col_pitch: 11.43
    cols: 3
    components:
      - id: L_IN
        type: jack_input
        col: 0
        cy: 17
        rotate: 180
        label: "L IN"
        font_size: 1.8
        cpp_id: "L_IN_INPUT"
      - id: R_IN
        type: jack_input
        col: 1
        cy: 17
        rotate: 180
        label: "R IN"
        font_size: 1.8
        cpp_id: "R_IN_INPUT"
      - id: GAIN_MAIN
        type: toggle_dw3
        cx: 28.575
        cy: 17
        rotate: 270
        label: "BOOST"
        label_dx: 3.3
        label_dy: 7
        cpp_param: "GAIN_PARAM"
      - id: BP3_L
        type: jack_input
        col: 0
        cy: 31.5
        rotate: 180
        label: "BP3 L"
        font_size: 1.6
        cpp_id: "ALT_BP_L_INPUT"
      - id: BP3_R
        type: jack_input
        col: 1
        cy: 31.5
        rotate: 180
        label: "BP3 R"
        font_size: 1.6
        cpp_id: "ALT_BP_R_INPUT"
      - id: GAIN_BP3
        type: toggle_dw3
        cx: 28.575
        cy: 31.5
        rotate: 270
        label: "BOOST"
        label_dx: 3.3
        label_dy: 7
        cpp_param: "ALT_GAIN_PARAM"

  # ── Section 0b: LFO ───────────────────────────────────────────────────────
  - id: zone_lfo
    label: "Zone 0b — LFO"
    x_start: 0
    col_pitch: 11.43
    cols: 3
    components:
      - id: LFO1_OUT
        type: jack_output
        label_border: true
        col: 0
        cy: 51.5
        label: "LFO 1"
        font_size: 1.6
        cpp_id: "LFO1_OUTPUT"
      - id: LFO1_LED
        type: led
        col: 1
        cy: 51.5
        led_fill:   "#112244"
        led_stroke: "#2255cc"
        cpp_id: "LFO1_LIGHT"
      - id: LFO1_RATE
        type: trimpot
        col: 2
        cy: 51.5
        label: "Rate 1"
        cpp_param: "LFO1_RATE_PARAM"
      - id: LFO2_OUT
        type: jack_output
        label_border: true
        col: 0
        cy: 65.9
        label: "LFO 2"
        font_size: 1.6
        cpp_id: "LFO2_OUTPUT"
      - id: LFO2_LED
        type: led
        col: 1
        cy: 65.9
        led_fill:   "#112244"
        led_stroke: "#2255cc"
        cpp_id: "LFO2_LIGHT"
      - id: LFO2_RATE
        type: trimpot
        col: 2
        cy: 65.9
        label: "Rate 2"
        cpp_param: "LFO2_RATE_PARAM"

  # ── Section 0c: MOD BUS ───────────────────────────────────────────────────
  - id: zone_mod
    label: "Zone 0c — MOD BUS"
    x_start: 0
    col_pitch: 11.43
    cols: 3
    components:
      - id: MOD_SRC_SW
        type: toggle_dw5
        col: 0
        cy: 89.5
        label: "MOD SRC"
        cpp_param: "MOD_SRC_PARAM"
      - id: SCALE
        type: trimpot
        col: 1
        cy: 83.75
        label: "SCALE"
        cpp_param: "MOD_SCALE_PARAM"
      - id: VCA_AMT
        type: trimpot
        col: 2
        cy: 83.75
        label: "VCA AMT"
        cpp_param: "VCA_AMT_PARAM"
      - id: OFFSET
        type: trimpot
        col: 1
        cy: 95.25
        label: "OFFSET"
        cpp_param: "MOD_OFFSET_PARAM"
      - id: VCA_OFS
        type: trimpot
        col: 2
        cy: 95.25
        label: "VCA OFS"
        cpp_param: "VCA_OFS_PARAM"
      - id: MOD_IN
        type: jack_input
        col: 1
        cy: 112.0
        label: "MOD IN"
        font_size: 1.6
        cpp_id: "MOD_INPUT"
      - id: VCA_IN
        type: jack_input
        col: 2
        cy: 112.0
        label: "VCA IN"
        font_size: 1.6
        cpp_id: "VCA_INPUT"

  # ── LP1: Low-Pass Filter 1 ────────────────────────────────────────────────────
  - id: zone_lp1
    label: "Zone — LP1 Low-Pass Filter"
    x_start: 34.29             # = 3 × 11.43mm; aligns LP1 col0 jack at 40.005mm = 28.575 + 11.43
    col_pitch: 11.43           # 2.25 HP/col — uniform grid with section-0
    cols: 3
    components:
      # ── Main knobs (all col 1 = section centre cx=51.435mm) ──────────────────
      - id: LP1_FREQ
        type: knob
        cap_mm: 18.0
        col: 1
        cy: 24.8
        label: "FREQ"
        cpp_param: "LP1_FREQ_PARAM"
      - id: LP1_TILT
        type: knob
        cap_mm: 14.0
        col: 1
        cy: 52.4
        label: "TILT"
        cpp_param: "LP1_TILT_PARAM"
      - id: LP1_RES
        type: knob
        cap_mm: 14.0
        col: 1
        cy: 78.0
        label: "RES"
        cpp_param: "LP1_RES_PARAM"
      # ── Attenuverters — compact pot (Bourns PTV09A style), no label ──────────
      - id: LP1_FREQ_ATT
        type: trimpot
        col: 0
        cy: 100.0
        cpp_param: "LP1_FREQ_ATT_PARAM"
      - id: LP1_TILT_ATT
        type: trimpot
        col: 1
        cy: 100.0
        cpp_param: "LP1_TILT_ATT_PARAM"
      - id: LP1_RES_ATT
        type: trimpot
        col: 2
        cy: 100.0
        cpp_param: "LP1_RES_ATT_PARAM"
      # ── CV input jacks (cy=112.0 matches section-0 bottom row) ───────────────
      - id: LP1_FREQ_IN
        type: jack_input
        col: 0
        cy: 112.0
        label: "FREQ"
        cpp_id: "LP1_FREQ_INPUT"
      - id: LP1_TILT_IN
        type: jack_input
        col: 1
        cy: 112.0
        label: "TILT"
        cpp_id: "LP1_TILT_INPUT"
      - id: LP1_RES_IN
        type: jack_input
        col: 2
        cy: 112.0
        label: "RES"
        cpp_id: "LP1_RES_INPUT"

  # ── BP CONTROL: Bandpass Filter Controls ──────────────────────────────────────
  - id: zone_bp
    label: "Zone — BP CONTROL"
    x_start: 68.58
    col_pitch: 11.43
    cols: 2
    components:
      # ── Knobs: Offset (M) → Tilt (M) → Mix (M), evenly spaced to switch ────
      - id: BP_OFFSET
        type: knob
        cap_mm: 9.0
        cx: 80.01
        cy: 24.80
        label: "OFFSET"
        cpp_param: "BP_OFFSET_PARAM"
      - id: BP_TILT
        type: knob
        cap_mm: 9.0
        cx: 80.01
        cy: 43.20
        label: "TILT"
        cpp_param: "BP_TILT_PARAM"
      - id: BP_MIX
        type: knob
        cap_mm: 9.0
        cx: 80.01
        cy: 61.60
        label: "BYPASS"
        cpp_param: "BP_BYPASS_PARAM"
      - id: BP_WET
        type: knob
        cap_mm: 9.0
        cx: 80.01
        cy: 80.00
        label: "WET"
        cpp_param: "BP_WET_PARAM"
      # ── CV attenuverter trim pots ────────────────────────────────────────────
      - id: BP_FREQ_ATT
        type: trimpot
        col: 0
        cy: 100.0
        cpp_param: "BP_FREQ_ATT_PARAM"
      - id: BP_TILT_ATT
        type: trimpot
        col: 1
        cy: 100.0
        cpp_param: "BP_TILT_ATT_PARAM"
      # ── CV input jacks ───────────────────────────────────────────────────────
      - id: BP_FREQ_IN
        type: jack_input
        col: 0
        cy: 112.0
        label: "FREQ"
        cpp_id: "BP_FREQ_INPUT"
      - id: BP_TILT_IN
        type: jack_input
        col: 1
        cy: 112.0
        label: "TILT"
        cpp_id: "BP_TILT_INPUT"

  # ── Zone: BP 1 ───────────────────────────────────────────────────────────────
  - id: zone_bp1
    label: "Zone — BP 1"
    x_start: 91.44
    col_pitch: 11.43
    cols: 3
    components:
      - id: BP1_DIST_SW
        type: toggle_dw5
        cx: 96.0
        cy: 24.80
        label: "DIST"
        cpp_param: "BP1_DIST_MODE_PARAM"
      - id: BP1_FREQ
        type: knob
        cap_mm: 18.0
        cx: 112.585
        cy: 24.80
        label: "FREQ"
        cpp_param: "BP1_FREQ_PARAM"
      - id: BP1_FOCUS
        type: knob
        cap_mm: 14.0
        cx: 100.44
        cy: 47.69
        label: "FOCUS"
        cpp_param: "BP1_FOCUS_PARAM"
      - id: BP1_TILT
        type: knob
        cap_mm: 14.0
        cx: 116.73
        cy: 63.85
        rotate: 180
        label: "TILT"
        cpp_param: "BP1_TILT_PARAM"
      - id: BP1_DIST
        type: knob
        cap_mm: 14.0
        cx: 100.44
        cy: 80.00
        label: "DIST"
        cpp_param: "BP1_DIST_PARAM"
      - id: BP1_CLIP_LED
        type: led_labeled
        cx: 116.585
        cy: 83.00
        label: "CLIP"
        led_fill: "#441111"
        led_stroke: "#cc2222"
        cpp_id: "BP1_CLIP_LIGHT"
      - id: BP1_FREQ_ATT
        type: trimpot
        col: 0
        cy: 100.0
        cpp_param: "BP1_FREQ_ATT_PARAM"
      - id: BP1_TILT_ATT
        type: trimpot
        col: 1
        cy: 100.0
        cpp_param: "BP1_TILT_ATT_PARAM"
      - id: BP1_DIST_ATT
        type: trimpot
        col: 2
        cy: 100.0
        cpp_param: "BP1_DIST_ATT_PARAM"
      - id: BP1_FREQ_IN
        type: jack_input
        col: 0
        cy: 112.0
        label: "FREQ"
        cpp_id: "BP1_FREQ_INPUT"
      - id: BP1_TILT_IN
        type: jack_input
        col: 1
        cy: 112.0
        label: "TILT"
        cpp_id: "BP1_TILT_INPUT"
      - id: BP1_DIST_IN
        type: jack_input
        col: 2
        cy: 112.0
        label: "DIST"
        cpp_id: "BP1_DIST_INPUT"

  # ── Zone: BP 2 ───────────────────────────────────────────────────────────────
  - id: zone_bp2
    label: "Zone — BP 2"
    x_start: 125.73
    col_pitch: 11.43
    cols: 3
    components:
      - id: BP2_DIST_SW
        type: toggle_dw5
        cx: 130.29
        cy: 24.80
        label: "DIST"
        cpp_param: "BP2_DIST_MODE_PARAM"
      - id: BP2_FREQ
        type: knob
        cap_mm: 18.0
        cx: 146.875
        cy: 24.80
        label: "FREQ"
        cpp_param: "BP2_FREQ_PARAM"
      - id: BP2_FOCUS
        type: knob
        cap_mm: 14.0
        cx: 134.730
        cy: 47.69
        label: "FOCUS"
        cpp_param: "BP2_FOCUS_PARAM"
      - id: BP2_TILT
        type: knob
        cap_mm: 14.0
        cx: 151.020
        cy: 63.85
        rotate: 180
        label: "TILT"
        cpp_param: "BP2_TILT_PARAM"
      - id: BP2_DIST
        type: knob
        cap_mm: 14.0
        cx: 134.730
        cy: 80.00
        label: "DIST"
        cpp_param: "BP2_DIST_PARAM"
      - id: BP2_CLIP_LED
        type: led_labeled
        cx: 150.875
        cy: 83.00
        label: "CLIP"
        led_fill: "#441111"
        led_stroke: "#cc2222"
        cpp_id: "BP2_CLIP_LIGHT"
      - id: BP2_FREQ_ATT
        type: trimpot
        col: 0
        cy: 100.0
        cpp_param: "BP2_FREQ_ATT_PARAM"
      - id: BP2_TILT_ATT
        type: trimpot
        col: 1
        cy: 100.0
        cpp_param: "BP2_TILT_ATT_PARAM"
      - id: BP2_DIST_ATT
        type: trimpot
        col: 2
        cy: 100.0
        cpp_param: "BP2_DIST_ATT_PARAM"
      - id: BP2_FREQ_IN
        type: jack_input
        col: 0
        cy: 112.0
        label: "FREQ"
        cpp_id: "BP2_FREQ_INPUT"
      - id: BP2_TILT_IN
        type: jack_input
        col: 1
        cy: 112.0
        label: "TILT"
        cpp_id: "BP2_TILT_INPUT"
      - id: BP2_DIST_IN
        type: jack_input
        col: 2
        cy: 112.0
        label: "DIST"
        cpp_id: "BP2_DIST_INPUT"

  # ── Zone: BP 3 ───────────────────────────────────────────────────────────────
  - id: zone_bp3
    label: "Zone — BP 3"
    x_start: 160.02
    col_pitch: 11.43
    cols: 3
    components:
      - id: BP3_DIST_SW
        type: toggle_dw5
        cx: 164.58
        cy: 24.80
        label: "DIST"
        cpp_param: "BP3_DIST_MODE_PARAM"
      - id: BP3_FREQ
        type: knob
        cap_mm: 18.0
        cx: 181.165
        cy: 24.80
        label: "FREQ"
        cpp_param: "BP3_FREQ_PARAM"
      - id: BP3_FOCUS
        type: knob
        cap_mm: 14.0
        cx: 169.020
        cy: 47.69
        label: "FOCUS"
        cpp_param: "BP3_FOCUS_PARAM"
      - id: BP3_TILT
        type: knob
        cap_mm: 14.0
        cx: 185.310
        cy: 63.85
        rotate: 180
        label: "TILT"
        cpp_param: "BP3_TILT_PARAM"
      - id: BP3_DIST
        type: knob
        cap_mm: 14.0
        cx: 169.020
        cy: 80.00
        label: "DIST"
        cpp_param: "BP3_DIST_PARAM"
      - id: BP3_CLIP_LED
        type: led_labeled
        cx: 185.165
        cy: 83.00
        label: "CLIP"
        led_fill: "#441111"
        led_stroke: "#cc2222"
        cpp_id: "BP3_CLIP_LIGHT"
      - id: BP3_FREQ_ATT
        type: trimpot
        col: 0
        cy: 100.0
        cpp_param: "BP3_FREQ_ATT_PARAM"
      - id: BP3_TILT_ATT
        type: trimpot
        col: 1
        cy: 100.0
        cpp_param: "BP3_TILT_ATT_PARAM"
      - id: BP3_DIST_ATT
        type: trimpot
        col: 2
        cy: 100.0
        cpp_param: "BP3_DIST_ATT_PARAM"
      - id: BP3_FREQ_IN
        type: jack_input
        col: 0
        cy: 112.0
        label: "FREQ"
        cpp_id: "BP3_FREQ_INPUT"
      - id: BP3_TILT_IN
        type: jack_input
        col: 1
        cy: 112.0
        label: "TILT"
        cpp_id: "BP3_TILT_INPUT"
      - id: BP3_DIST_IN
        type: jack_input
        col: 2
        cy: 112.0
        label: "DIST"
        cpp_id: "BP3_DIST_INPUT"

  # ── Zone: BP3 OUT ────────────────────────────────────────────────────────────
  - id: zone_bp3_out
    label: "Zone — BP3 OUT"
    x_start: 194.31
    col_pitch: 11.43
    cols: 2
    components:
      - id: BP3_L_OUT
        type: jack_output
        label_border: true
        col: 0
        cy: 17.0
        rotate: 180
        label: "BP3 L"
        font_size: 1.6
        cpp_id: "BP3_L_OUTPUT"
      - id: BP3_R_OUT
        type: jack_output
        label_border: true
        col: 1
        cy: 17.0
        rotate: 180
        label: "BP3 R"
        font_size: 1.6
        cpp_id: "BP3_R_OUTPUT"

  # ── Zone: HP ─────────────────────────────────────────────────────────────────
  - id: zone_hp
    label: "Zone — HP"
    x_start: 194.31
    col_pitch: 11.43
    cols: 2
    components:
      - id: HP_FREQ
        type: slider_V45
        cx: 205.74
        cy: 54.0
        label: ""
        cpp_param: "HP_FREQ_PARAM"
      - id: HP_RES
        type: trimpot
        cx: 205.74
        cy: 87.0
        label: "RES"
        cpp_param: "HP_RES_PARAM"
      - id: HP_FREQ_ATT
        type: trimpot
        col: 0
        cy: 100.0
        cpp_param: "HP_FREQ_ATT_PARAM"
      - id: HP_RES_ATT
        type: trimpot
        col: 1
        cy: 100.0
        cpp_param: "HP_RES_ATT_PARAM"
      - id: HP_FREQ_IN
        type: jack_input
        col: 0
        cy: 112.0
        label: "FREQ"
        cpp_id: "HP_FREQ_INPUT"
      - id: HP_RES_IN
        type: jack_input
        col: 1
        cy: 112.0
        label: "RES"
