# POGO panel data — edit this file to change the panel layout.
# Generated SVG and C++ stubs are produced by tools/build_panel.py.

# ── Meta ─────────────────────────────────────────────────────────────────────
meta:
  width_mm: 203.20
  height_mm: 128.5
  viewBox: "0 0 203.20 128.5"
  title: "POGO  · STEREO TRIPLE BANDPASS FILTER"
  title_dot_color: "#ff8800"
  brand: "SPACE COAST SYNTHESIZERS  ·  SCS"

# ── Colors ───────────────────────────────────────────────────────────────────
colors:
  panel_bg:       "#0d0d0d"
  panel_strip:    "#141414"
  cyan:           "#00d4ff"
  brand_text:     "#4a6070"
  control_text:   "#999"
  jack_text:      "#888"
  jack_outer:     "#555"
  jack_inner:     "#333"
  jack_inner_s:   "#666"
  knob_fill:      "#1a1a1a"
  knob_stroke:    "#555"
  indicator:      "#aaa"
  switch_body:    "#222"
  switch_slug:    "#666"
  switch_slug_s:  "#888"
  switch_label:   "#3d5260"
  subdiv:         "#2a2a2a"
  zone_div:       "#2d2d2d"
  output_rect_s:  "#888"
  led_fill:       "#441111"
  led_stroke:     "#cc2222"

# ── Design rules ─────────────────────────────────────────────────────────────
design_rules:
  top_keepout:       10.0
  bot_keepout_start: 118.5
  cv_jack_cy:        112.5     # nut bottom = 117.5mm → 1mm clear of keepout at 118.5
  att_offset:       -10.75     # att_cy = cv_jack_cy + att_offset = 101.75
  jack_label_dy:      7.0      # label_y = cy + 7.0
  output_rect_dy:    -1.76     # rect_y = label_y + output_rect_dy (= label_y - 1.76)
  output_rect_h:      2.26
  output_rect_rx:     0.6
  jack_pitch:        10.16
  indicator_length:   2.5      # trimpot indicator: from cy to cy - indicator_length

# ── Hardware footprints (for DRC overlay) ────────────────────────────────────
footprints:
  jack_thonkiconn:
    body_r_mm: 4.0      # PCB footprint outer radius
    nut_r_mm:  5.0      # PJ301M-12 hex nut flat-to-flat / 2 ≈ 5.0 mm
  pot_alpha9mm:
    body_r_mm: 4.5
    nut_r_mm:  5.5      # M7 bushing nut across-flats / 2
  led_3mm:
    body_r_mm: 1.5

# ── Mounting holes ────────────────────────────────────────────────────────────
mounting_holes:
  - {cx: 7.5,    cy: 5.1}
  - {cx: 195.70, cy: 5.1}
  - {cx: 7.5,    cy: 123.4}
  - {cx: 195.70, cy: 123.4}

# ── Separator lines ───────────────────────────────────────────────────────────
separators:
  # Main zone separators (cyan vertical)
  - {type: v, x: 20.32,  y1: 4.5, y2: 124.0, style: main_cyan}
  - {type: v, x: 50.80,  y1: 4.5, y2: 124.0, style: main_cyan}
  - {type: v, x: 142.24, y1: 4.5, y2: 124.0, style: main_cyan}
  - {type: v, x: 162.56, y1: 4.5, y2: 124.0, style: main_cyan}
  - {type: v, x: 182.88, y1: 4.5, y2: 124.0, style: main_cyan}
  # Band sub-dividers (dim gray vertical)
  - {type: v, x: 81.28,  y1: 4.5, y2: 124.0, style: subdiv_gray}
  - {type: v, x: 111.76, y1: 4.5, y2: 124.0, style: subdiv_gray}
  # Zone 0 mini-zone dividers (gray horizontal)
  - {type: h, x1: 0.5,   x2: 19.82, y: 51.78, style: zone_div}
  - {type: h, x1: 0.5,   x2: 19.82, y: 94.2,  style: zone_div}
  # Zone 1 subsection divider
  - {type: h, x1: 20.82, x2: 50.30, y: 76.0,  style: zone_div}
  # LP2+HP horizontal divider (cyan)
  - {type: h, x1: 142.24, x2: 203.20, y: 28.0, style: main_cyan}

# ── Zone labels ───────────────────────────────────────────────────────────────
zone_labels:
  - {x: 10.16,  y: 9.0,   text: "INPUT / GAIN"}
  - {x: 10.16,  y: 56.78, text: "LFO"}
  - {x: 10.16,  y: 99.2,  text: "MOD BUS"}
  - {x: 35.56,  y: 9.0,   text: "CONTROL"}
  - {x: 66.04,  y: 9.0,   text: "BAND 1",   subtitle: "200Hz–2kHz"}
  - {x: 96.52,  y: 9.0,   text: "BAND 2",   subtitle: "1.5kHz–8kHz"}
  - {x: 127.00, y: 9.0,   text: "BAND 3",   subtitle: "6kHz–20kHz"}
  - {x: 152.40, y: 9.0,   text: "VCA"}
  - {x: 152.40, y: 33.0,  text: "LP 1"}
  - {x: 172.72, y: 9.0,   text: "BAND OUT"}
  - {x: 193.04, y: 9.0,   text: "OUT"}
  - {x: 172.72, y: 33.0,  text: "LP 2"}
  - {x: 193.04, y: 33.0,  text: "HP"}

# ── Band template (anchor, merged by Bands 1/2/3) ────────────────────────────
_band_template: &band_template
  freq:
    type: knob_xl
    cy: 34
    label: "FREQ"
  focus:
    type: knob_large
    cy: 63
    label: "FOCUS"
  drive:
    type: knob_large
    cy: 89
    label: "DRIVE"
  atts:
    cy_offset: 0   # att_cy computed from design_rules
    labels: ["FREQ", "FOCUS", "DRIVE"]
  cv_jacks:
    labels: ["FREQ", "FOCUS", "DRIVE"]
    cpp_params: ["FREQ_ATT_{N}_PARAM", "FB_ATT_{N}_PARAM", "DRIVE_ATT_{N}_PARAM"]
    cpp_inputs: ["FREQ_CV_{N}_INPUT", "FB_CV_{N}_INPUT", "DRIVE_CV_{N}_INPUT"]
  cpp_params:
    freq:  "FREQ_{N}_PARAM"
    focus: "FB_{N}_PARAM"
    drive: "DRIVE_{N}_PARAM"

# ── Zones ─────────────────────────────────────────────────────────────────────
zones:

  - id: zone0a
    label: "Zone 0a — INPUT / GAIN"
    x_center: 10.16
    components:
